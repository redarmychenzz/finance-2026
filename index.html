/* ===== 趨勢頁：三分頁市值曲線（getSnapshots 每日快照真實資料） =====
 * 互動規格（原型定案）：
 *   預設近 20 個交易日；右上快捷 20/60/120 日；手勢連續縮放（手機上下滑、電腦滾輪，7 天～全部）
 *   長按(手機)／點擊或按住拖曳(電腦) → 對位線＋白底單日資訊框（浮在資料點旁）；右下 ✕ 關閉
 *   資料點以每日直向格線標示（>60 日簡化為每 5 天一條）；Y 軸貼合可見區間（看得出趨勢）
 *   跳過週六日快照；市值欄為 null 的舊資料列直接略過（不補 0）
 * 資料：DailySnapshot 總資產自 2026-07-14 起、台股/美股市值自 2026-07-16 起，隨每日 07:00 快照累積 */
const pind=document.getElementById('pind'),pills=document.querySelectorAll('.pill'),tSum=document.getElementById('tSum');
const tcw=document.getElementById('tcw'),tSvg=document.getElementById('tSvg'),tXl=document.getElementById('tXl'),
      tChipA=document.getElementById('tChipA'),tChipR=document.getElementById('tChipR'),
      tDayTip=document.getElementById('tDayTip'),tXbtn=document.getElementById('tXbtn');
const T_H=340, T_MIN_W=7;
const T_SERIES=[
  {name:'總資產',   color:'#8b93f0', get:r=>r.netWorth},
  {name:'台股市值', color:'#ef8b68', get:r=>r.value?r.value.tw_stock:null},
  {name:'美股市值', color:'#d4aaea', get:r=>(r.value&&r.value.sub_broker!=null&&r.value.overseas!=null)?r.value.sub_broker+r.value.overseas:null},
];
const tSt={tab:0, win:20, sel:null};       // sel = 檢視中的資料點 index（相對可見範圍）
let tRows=null, tLoading=false, tLoadedAt=0;
let tPts=[], tPX=[], tPY=[];               // 可見資料點與其 svg 座標

const T_WD=['日','一','二','三','四','五','六'];
const tMD=d=>`${d.getMonth()+1}/${d.getDate()}`;
const tMDW=d=>`${d.getMonth()+1}/${d.getDate()}（${T_WD[d.getDay()]}）`;
const tHidden=()=>document.body.classList.contains('amt-hidden');
const tM=v=>tHidden()?'••••••':fmt(v);                                        // 金額遮罩（配合右上眼睛）
const tWan=v=>tHidden()?'':Math.round(v/1e4).toLocaleString('en-US')+'萬';   // Y 軸刻度

// 快照列 → 分頁資料點（跳過六日；null/非數值略過，不補 0）
function tSeriesPoints(tab){
  if(!tRows) return [];
  const get=T_SERIES[tab].get, out=[];
  tRows.forEach(r=>{
    const p=String(r.date||'').split('-');
    if(p.length!==3) return;
    const d=new Date(+p[0],+p[1]-1,+p[2]);
    if(d.getDay()===0||d.getDay()===6) return;
    const v=get(r);
    if(v==null||!isFinite(Number(v))) return;
    out.push({d, v:Number(v)});
  });
  return out;   // getSnapshots 已依日期由舊到新排序
}

function tRender(){
  const s=T_SERIES[tSt.tab];
  const all=tSeriesPoints(tSt.tab);
  tPts=all.slice(-Math.max(T_MIN_W,Math.round(tSt.win)));
  if(tSt.sel!=null&&tSt.sel>=tPts.length) tSt.sel=null;
  if(!tPts.length){
    tSvg.innerHTML=''; tXl.innerHTML='';
    tChipA.textContent='—'; tChipR.textContent='尚無資料';
    tSum.innerHTML=`<b>${s.name}</b>尚無快照資料，將隨每日 07:00 快照自動累積`;
    tcw.classList.remove('inspect');
    return;
  }
  const N=tPts.length, H=T_H;
  const vs=tPts.map(p=>p.v);
  let lo=Math.min(...vs), hi=Math.max(...vs);
  const pad=Math.max((hi-lo)*0.1,(hi||1)*0.002); lo-=pad; hi+=pad;   // Y 軸貼合區間
  const X=i=>N===1?200:(i/(N-1))*400;
  const Y=v=>H-10-((v-lo)/(hi-lo))*(H-56);
  tPX=tPts.map((p,i)=>X(i)); tPY=tPts.map(p=>Y(p.v));
  const line='M'+tPts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' L');
  const area=line+` L${X(N-1).toFixed(1)},${H} L${X(0).toFixed(1)},${H} Z`;
  let grid='';
  for(let g=1;g<=3;g++){
    const y=10+(H-56)*g/4+12, val=hi-(hi-lo)*g/4;
    grid+=`<line x1="0" y1="${y.toFixed(1)}" x2="400" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,.08)"/>`+
          `<text x="396" y="${(y-4).toFixed(1)}" text-anchor="end" font-size="10" fill="rgba(255,255,255,.32)">${tWan(val)}</text>`;
  }
  // 資料點：每日直向格線（>60 日簡化為每 5 天一條）
  const dense=N>60;
  for(let i=0;i<N;i+=(dense?5:1)){
    grid+=`<line x1="${X(i).toFixed(1)}" y1="14" x2="${X(i).toFixed(1)}" y2="${H-10}" stroke="rgba(255,255,255,${dense?'.05':'.07'})"/>`;
  }
  const last=tPts[N-1];
  let cross='';
  if(tSt.sel!=null){
    const cx=X(tSt.sel).toFixed(1), cy=Y(tPts[tSt.sel].v).toFixed(1);
    cross=`<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="rgba(255,255,255,.45)" stroke-width="1" stroke-dasharray="3 3"/>`+
          `<circle cx="${cx}" cy="${cy}" r="5.4" fill="${s.color}" stroke="#fff" stroke-width="2"/>`;
  }
  tSvg.innerHTML=`<defs><linearGradient id="tgg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${s.color}" stop-opacity=".26"/><stop offset="1" stop-color="${s.color}" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#tgg)"/>
    <path d="${line}" fill="none" stroke="${s.color}" stroke-width="2.6" stroke-linejoin="round"/>
    <circle cx="${X(N-1).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="4.6" fill="${s.color}" stroke="#000" stroke-width="2.2"/>
    ${cross}`;
  const lbl=N===1?[tMD(tPts[0].d)] : N===2?[tMD(tPts[0].d),tMD(last.d)]
    : [tMD(tPts[0].d), tMD(tPts[Math.floor((N-1)/2)].d), tMD(last.d)];
  tXl.innerHTML=lbl.map(t=>`<span>${t}</span>`).join('');
  tcw.classList.toggle('inspect',tSt.sel!=null);
  tUpdateInfo();
  tPlaceTip();
}
/* 左上資訊片＋下方摘要：目前可見區間的增減（不受單日檢視影響） */
function tUpdateInfo(){
  const first=tPts[0], last=tPts[tPts.length-1];
  const diff=last.v-first.v, pct=first.v?diff/first.v*100:0;
  const cls=diff>0?'chg-pos':diff<0?'chg-neg':'chg-zero', sign=diff>0?'+':'';
  tChipA.innerHTML=`<span class="${cls}">${sign}${tM(diff)}</span> <span style="font-size:12px;" class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
  tChipR.textContent=`${tMD(first.d)} – ${tMD(last.d)} · ${tPts.length} 個交易日`;
  tSum.innerHTML=`我的<b>${T_SERIES[tSt.tab].name}</b>目前 <b>${tM(last.v)} 元</b>，此區間${diff>=0?'增加':'減少'} <span class="${cls}">${sign}${tM(diff)} 元</span>`;
}
/* 單日資訊框：浮在資料點旁（靠右緣自動翻到左側、貼上下緣夾住） */
function tPlaceTip(){
  if(tSt.sel==null) return;
  const i=tSt.sel, p=tPts[i];
  let d1='';
  if(i>0){
    const df=p.v-tPts[i-1].v, c=df>0?'chg-pos':df<0?'chg-neg':'chg-zero', sg=df>0?'+':'';
    d1=`<span class="${c}">${sg}${tM(df)}</span> <span class="muted">較前一交易日</span>`;
  }
  tDayTip.querySelector('.d').textContent=tMDW(p.d)+`・${T_SERIES[tSt.tab].name}`;
  tDayTip.querySelector('.v').textContent=tM(p.v);
  tDayTip.querySelector('.c').innerHTML=d1;
  const W=tcw.clientWidth, Hpx=tcw.clientHeight;
  const px=tPX[i]/400*W, py=tPY[i]/T_H*Hpx;
  const tw=tDayTip.offsetWidth, th=tDayTip.offsetHeight;
  tDayTip.style.left=(px>W*0.55 ? px-tw-14 : px+14)+'px';
  tDayTip.style.top =Math.max(8, Math.min(Hpx-th-8, py-th/2))+'px';
}

/* 舊介面相容：主資料載入完 / 眼睛切換 時呼叫 → 已有快照就依遮罩狀態重繪 */
function renderTrendSum(){ if(tRows) tRender(); }

/* 讀取快照（開啟趨勢頁時觸發；5 分鐘內重開不重抓） */
function trendLoad(force){
  if(tLoading) return;
  if(tRows && !force && Date.now()-tLoadedAt<5*60*1000) return;
  tLoading=true;
  if(!tRows) tSum.innerHTML='<span style="color:var(--txt2)">載入快照資料中…</span>';
  api({action:'getSnapshots'}).then(res=>{
    if(!(res&&res.ok&&Array.isArray(res.rows))) throw new Error('bad response');
    tRows=res.rows; tLoadedAt=Date.now();
    tRender();
  }).catch(()=>{
    if(!tRows){
      tSum.innerHTML='快照載入失敗（<span id="tRetry" style="text-decoration:underline;cursor:pointer;color:#fff">點此重試</span>）';
      const rt=document.getElementById('tRetry'); if(rt) rt.addEventListener('click',()=>trendLoad(true));
    }
  }).finally(()=>{ tLoading=false; });
}

/* 分頁 pill */
pills.forEach(p=>p.addEventListener('click',()=>{
  pills.forEach(x=>x.classList.remove('on'));p.classList.add('on');
  tSt.tab=Number(p.dataset.tab); tSt.sel=null;
  pind.style.transform=`translateX(${tSt.tab*100}%)`;
  if(tRows) tRender();
}));
/* 20/60/120 日快捷；手勢縮放到對應天數時自動反白 */
const tPresetBtns=document.querySelectorAll('#tPresets button');
tPresetBtns.forEach(b=>b.addEventListener('click',()=>{
  tSt.win=Number(b.dataset.w); tSt.sel=null; tSyncPresets();
  if(tRows) tRender();
}));
function tSyncPresets(){
  const w=Math.round(tSt.win);
  tPresetBtns.forEach(b=>b.classList.toggle('on', Number(b.dataset.w)===w));
}
tXbtn.addEventListener('click',e=>{e.stopPropagation(); tSt.sel=null; tRender();});

/* 對位線：座標 → 最近資料點 */
function tPickIndex(clientX){
  const r=tcw.getBoundingClientRect();
  const fx=(clientX-r.left)/r.width*400;
  let best=0,bd=1e9;
  tPX.forEach((x,i)=>{const d=Math.abs(x-fx); if(d<bd){bd=d;best=i;}});
  return best;
}
/* 電腦：滾輪連續縮放（7 天～全部） */
tcw.addEventListener('wheel',e=>{
  e.preventDefault();
  if(!tPts.length) return;
  tSt.sel=null;
  const max=Math.max(T_MIN_W, tSeriesPoints(tSt.tab).length);
  tSt.win=Math.max(T_MIN_W, Math.min(max, tSt.win*(e.deltaY>0?1.10:1/1.10)));
  tSyncPresets(); tRender();
},{passive:false});

/* 統一手勢層（Pointer Events + capture）：
 *   滑鼠：按下即出對位線，按住左右拖曳連續換日
 *   觸控：長按 350ms 出對位線（按著左右滑換日）；直接上下滑 = 連續縮放
 * 頁面捲動由 .tcw 的 touch-action:none 擋掉 */
let tPtr=null;
tcw.addEventListener('pointerdown',e=>{
  if(!tPts.length) return;
  if(e.target.closest('.t-xbtn')||e.target.closest('.t-presets')) return;
  if(e.pointerType==='mouse'&&e.button!==0) return;
  try{ tcw.setPointerCapture(e.pointerId); }catch(_){}
  tPtr={id:e.pointerId,x:e.clientX,y:e.clientY,mode:null,startWin:tSt.win,lpTimer:null};
  if(e.pointerType==='mouse'){
    tPtr.mode='inspect'; tSt.sel=tPickIndex(e.clientX); tRender();
  }else{
    tPtr.lpTimer=setTimeout(()=>{
      if(tPtr){ tPtr.mode='inspect'; tSt.sel=tPickIndex(tPtr.x); tRender(); }
    },350);
  }
});
tcw.addEventListener('pointermove',e=>{
  if(!tPtr||e.pointerId!==tPtr.id) return;
  const dx=e.clientX-tPtr.x, dy=e.clientY-tPtr.y;
  if(tPtr.mode==null){
    if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)){ clearTimeout(tPtr.lpTimer); tPtr.mode='zoom'; }
    else if(Math.abs(dx)>10){ clearTimeout(tPtr.lpTimer); tPtr.mode='drag'; }   // 橫向快滑：不觸發長按也不縮放
    else return;
  }
  if(e.cancelable) e.preventDefault();
  if(tPtr.mode==='zoom'){
    tSt.sel=null;
    const max=Math.max(T_MIN_W, tSeriesPoints(tSt.tab).length);
    tSt.win=Math.max(T_MIN_W, Math.min(max, tPtr.startWin*Math.pow(2,dy/130)));   // 連續：滑多少縮放多少
    tSyncPresets(); tRender();
  }else if(tPtr.mode==='inspect'){
    const i=tPickIndex(e.clientX);
    if(i!==tSt.sel){ tSt.sel=i; tRender(); }
  }
});
['pointerup','pointercancel'].forEach(ev=>tcw.addEventListener(ev,e=>{
  if(tPtr&&e.pointerId===tPtr.id){ clearTimeout(tPtr.lpTimer); tPtr=null; }
}));
tcw.addEventListener('contextmenu',e=>e.preventDefault());   // 擋掉長按系統選單

/* ===== 底部選單 ===== */
const ov=document.getElementById('ov'),sheet=document.getElementById('sheet');
document.getElementById('moreBtn').addEventListener('click',openReport);   // 2026-07-17:導覽列最右鈕直接進投資分析日報(原底部選單已取消入口)

/* ===== 投資分析日報分頁(2026-07-17):選單第一項「投資分析日報」開啟全螢幕面板 ===== */
const rptPanel=document.getElementById('rptPanel'),rptFrame=document.getElementById('rptFrame'),
      rptMsg=document.getElementById('rptMsg'),rptUpd=document.getElementById('rptUpd');
function rptShow(html,updated){
  rptMsg.style.display='none';rptFrame.style.display='block';
  rptFrame.srcdoc=html;
  if(updated){
    try{rptUpd.textContent='更新於 '+new Date(updated).toLocaleString('zh-TW',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
    catch(_){rptUpd.textContent='';}
  }else{rptUpd.textContent='';}
}
function openReport(){
  ov.classList.remove('show');sheet.classList.remove('show');
  rptPanel.classList.add('show');
  let cached=null;
  try{cached=localStorage.getItem('rptHtml');}catch(_){}
  if(cached){rptShow(cached,localStorage.getItem('rptUpd'));}
  else{rptMsg.style.display='flex';rptFrame.style.display='none';rptMsg.textContent='載入中…';}
  fetch(API_URL+'?action=getReport').then(r=>r.json()).then(j=>{
    if(j&&j.ok&&j.html&&j.html.length>200){
      try{localStorage.setItem('rptHtml',j.html);localStorage.setItem('rptUpd',j.updated||'');}catch(_){}
      rptShow(j.html,j.updated);
    }else if(!cached){
      rptMsg.textContent=(j&&j.error)?('後端回應:'+j.error):'日報尚未發布——後端 putReport/getReport 部署後,第一份日報產出即可在此閱讀。';
    }
  }).catch(()=>{if(!cached){rptMsg.textContent='無法連線,請稍後再試';}});
}
document.getElementById('rptClose').addEventListener('click',()=>{rptPanel.classList.remove('show');});
ov.addEventListener('click',()=>{ov.classList.remove('show');sheet.classList.remove('show');});

/* 「全部更新」：清掉快取並強制重新抓取 */
document.getElementById('refreshAll').addEventListener('click',()=>{
  ov.classList.remove('show');sheet.classList.remove('show');
  try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
  boot(true);
});

/* ===== 設定頁 — 欄位對應（動態，讀寫 Config 分頁） ===== */
const settingsEl=document.getElementById('settings');
const cfgListEl=document.getElementById('cfgList');
const setStatusEl=document.getElementById('setStatus');
let settingsLoaded=false;

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(msg,type){setStatusEl.textContent=msg||'';setStatusEl.className='set-status'+(type?(' '+type):'');}

// 八欄下拉選項
const CFG_GROUPS=['bank','tw_stock','sub_broker','overseas','daily','_setting'];
const CFG_CURRENCIES=['','TWD','USD'];
function optionList(options, val){
  const opts = options.indexOf(val)>=0 ? options : [val, ...options];   // 未知值也保留，不會被吃掉
  return opts.map(o=>`<option value="${esc(o)}"${o===val?' selected':''}>${o===''?'（空）':esc(o)}</option>`).join('');
}
// 前端解析「分頁!範圍」（含 {MONTH} 置換），供測試按鈕用
function monthTab(){ return (new Date().getMonth()+1)+'月'; }
function parseRangeClient(ref){
  if(!ref) return null;
  ref=String(ref).replace(/\{MONTH\}/g, monthTab());
  const i=ref.indexOf('!'); if(i<0) return null;
  return { sheet:ref.slice(0,i).trim().replace(/^'|'$/g,''), cell:ref.slice(i+1).trim() };
}

// 建一列可編輯的欄位對應（八欄：id/群組/名稱範圍/金額範圍/幣別/排序/備註/顯示名稱）
function cfgRowEl(c){
  c=c||{id:'',group:'',nameRange:'',amountRange:'',currency:'',order:'',note:'',displayName:''};
  const row=document.createElement('div');
  row.className='cfg-row';
  row.innerHTML=`
    <div class="cfg-fields">
      <label>id<input class="f-id" value="${esc(c.id)}" placeholder="bank_1"></label>
      <label>群組<select class="f-group">${optionList(CFG_GROUPS, c.group||'')}</select></label>
      <label>名稱範圍<input class="f-nameRange" value="${esc(c.nameRange)}" placeholder="帳戶!R7:R9"></label>
      <label>金額範圍<input class="f-amountRange" value="${esc(c.amountRange)}" placeholder="帳戶!X7:X9"></label>
      <label>幣別<select class="f-currency">${optionList(CFG_CURRENCIES, (c.currency||'').toUpperCase())}</select></label>
      <label>排序<input class="f-order" value="${esc(c.order!=null?c.order:'')}" placeholder="1"></label>
      <label>備註<input class="f-note" value="${esc(c.note)}" placeholder="實體銀行"></label>
      <label>顯示名稱<input class="f-displayName" value="${esc(c.displayName)}" placeholder="覆寫用，可留空"></label>
    </div>
    <div class="cfg-actions">
      <button class="cfg-test">測試</button>
      <button class="cfg-del">刪除</button>
      <span class="cfg-result"></span>
    </div>`;
  // 測試：讀該範圍第一格的值（優先金額範圍，其次名稱範圍）
  row.querySelector('.cfg-test').addEventListener('click',()=>{
    const ref=(row.querySelector('.f-amountRange').value.trim())||(row.querySelector('.f-nameRange').value.trim());
    const res=row.querySelector('.cfg-result');
    const pr=parseRangeClient(ref);
    if(!pr){res.className='cfg-result err';res.textContent='範圍需為「分頁!儲存格」格式';return;}
    res.className='cfg-result';res.textContent='讀取中…';
    api({action:'readCell',sheet:pr.sheet,cell:pr.cell}).then(r=>{
      if(!r||r.ok===false)throw new Error((r&&r.error)||'讀取失敗');
      res.className='cfg-result';res.textContent=pr.sheet+'!'+pr.cell+' 第一格 = '+r.value;
    }).catch(err=>{res.className='cfg-result err';res.textContent='✕ '+((err&&err.message)||err);});
  });
  row.querySelector('.cfg-del').addEventListener('click',()=>row.remove());
  return row;
}

function renderSettings(config){
  cfgListEl.innerHTML='';
  (config||[]).forEach(c=>cfgListEl.appendChild(cfgRowEl(c)));
}

// 第一次進設定頁才讀 Config（避免每次切頁重打）
function ensureSettingsLoaded(){
  if(settingsLoaded)return;
  setStatus('讀取 Config 中…');
  api({action:'getConfig'}).then(r=>{
    if(!r||r.ok===false)throw new Error((r&&r.error)||'getConfig 失敗');
    renderSettings(r.config);
    settingsLoaded=true;
    setStatus('');
  }).catch(err=>{setStatus('讀取失敗：'+((err&&err.message)||err),'err');});
}

document.getElementById('openSet').addEventListener('click',()=>{
  ov.classList.remove('show');sheet.classList.remove('show');
  settingsEl.classList.add('show');
  ensureSettingsLoaded();
});
document.getElementById('setBack').addEventListener('click',()=>settingsEl.classList.remove('show'));
document.getElementById('cfgAdd').addEventListener('click',()=>cfgListEl.appendChild(cfgRowEl()));
document.getElementById('cfgSave').addEventListener('click',()=>{
  const rows=[...cfgListEl.querySelectorAll('.cfg-row')].map(row=>{
    const ov=row.querySelector('.f-order').value.trim();
    return {
      id:row.querySelector('.f-id').value.trim(),
      group:row.querySelector('.f-group').value.trim(),
      nameRange:row.querySelector('.f-nameRange').value.trim(),
      amountRange:row.querySelector('.f-amountRange').value.trim(),
      currency:row.querySelector('.f-currency').value.trim(),
      order: ov===''?'':(isNaN(Number(ov))?ov:Number(ov)),
      note:row.querySelector('.f-note').value.trim(),
      displayName:row.querySelector('.f-displayName').value.trim()
    };
  }).filter(c=>c.id||c.group||c.nameRange||c.amountRange);
  // 儲存前確認：saveConfig 會清掉 Config 現有內容再整批寫入
  if(!window.confirm('確定用目前這 '+rows.length+' 列覆寫 Google Sheet 的 Config 分頁？\n此動作會清掉 Config 現有 A~H 內容再寫入，無法復原。')) return;
  const btn=document.getElementById('cfgSave');
  btn.disabled=true;setStatus('儲存中…');
  api({action:'saveConfig',config:JSON.stringify(rows)}).then(r=>{
    if(!r||r.ok===false)throw new Error((r&&r.error)||'saveConfig 失敗');
    setStatus('✓ 已儲存 '+r.saved+' 列（八欄）到 Google Sheet（按「全部更新」即套用）','ok');
    try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
  }).catch(err=>{setStatus('✕ 儲存失敗：'+((err&&err.message)||err),'err');}).then(()=>{btn.disabled=false;});
});
</script>
