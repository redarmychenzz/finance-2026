<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>我的財務 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── Reset ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#3B82F6;
  --primary-dim:rgba(59,130,246,0.15);
  --green:#22C55E;
  --green-dim:rgba(34,197,94,0.15);
  --red:#EF4444;
  --red-dim:rgba(239,68,68,0.15);
  --bg:#0F1117;
  --card:#1E2433;
  --sidebar-bg:#161B27;
  --border:1px solid #2A3147;
  --muted:#8B95A9;
  --text:#FFFFFF;
  --radius:12px;
  --sidebar-w:180px;
  --tab-h:58px;
}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
    Helvetica,Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;
}

/* ── Password Gate ─────────────────────────────── */
#gate{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%,#0d1b35 0%,#0F1117 60%,#070A10 100%);
  display:flex;align-items:center;justify-content:center;
}
.gate-box{
  background:var(--card);border:var(--border);border-radius:20px;
  padding:44px 36px 36px;width:min(360px,92vw);text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(59,130,246,.08);
}
.gate-icon{font-size:44px;margin-bottom:14px}
.gate-title{font-size:21px;font-weight:700;color:#FFFFFF;margin-bottom:6px}
.gate-sub{font-size:13px;color:var(--muted);margin-bottom:26px}
.gate-inp{
  width:100%;padding:12px 15px;
  background:#141922;border:1px solid #2A3147;border-radius:10px;
  font-size:16px;outline:none;color:#FFFFFF;caret-color:var(--primary);
  transition:border-color .2s;
}
.gate-inp::placeholder{color:#3D4A5E}
.gate-inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.gate-btn{
  margin-top:14px;width:100%;padding:13px;
  background:var(--primary);color:#fff;
  border:none;border-radius:10px;font-size:16px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .1s;
}
.gate-btn:hover{opacity:.9}
.gate-btn:active{transform:scale(.98)}
.gate-err{min-height:20px;margin-top:10px;font-size:13px;color:var(--red)}

/* ── App ───────────────────────────────────────── */
#app{display:none;height:100%}

/* ── Sidebar ────────────────────────────────────── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:var(--sidebar-bg);border-right:var(--border);
  display:flex;flex-direction:column;
  padding:24px 0 16px;z-index:200;
}
.sb-logo{
  padding:0 16px 22px;border-bottom:var(--border);margin-bottom:8px;
}
.sb-logo h1{
  font-size:15px;font-weight:700;line-height:1.35;color:#FFFFFF;
  display:flex;align-items:flex-start;gap:8px;
}
.sb-logo h1::before{
  content:'';display:block;width:8px;height:8px;margin-top:4px;
  background:var(--primary);border-radius:50%;flex-shrink:0;
  box-shadow:0 0 8px rgba(59,130,246,.6);
}
.sb-logo span{font-size:11px;color:var(--muted);margin-top:4px;display:block}
.sb-nav{flex:1;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;
  font-size:13.5px;font-weight:500;cursor:pointer;
  color:var(--muted);
  border-left:3px solid transparent;
  transition:background .15s,color .15s,border-color .15s;
}
.nav-item:hover{background:rgba(255,255,255,.04);color:#C8D0E0}
.nav-item.active{
  background:var(--primary-dim);
  color:var(--primary);
  border-left-color:var(--primary);
}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sb-footer{padding:0 16px;font-size:11px;color:var(--muted)}

/* ── Main ────────────────────────────────────────── */
.main{margin-left:var(--sidebar-w);min-height:100vh;padding:26px 28px 48px}

/* ── Page header ─────────────────────────────────── */
.page-hd{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:22px;flex-wrap:wrap;gap:8px;
}
.page-hd h2{font-size:21px;font-weight:700;color:#FFFFFF}
.page-hd-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{
  background:var(--primary-dim);color:var(--primary);
  padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;
}
.updated{font-size:11.5px;color:var(--muted)}

/* ── KPI Grid ────────────────────────────────────── */
.kpi-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  margin-bottom:22px;
}
.kpi{
  background:var(--card);border:var(--border);border-radius:var(--radius);
  padding:20px 20px 18px;position:relative;overflow:hidden;
}
.kpi::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),transparent);
  opacity:.5;
}
.kpi-lbl{font-size:13px;color:var(--muted);font-weight:400;margin-bottom:10px}
.kpi-val{
  font-size:28px;font-weight:600;line-height:1.1;
  word-break:break-all;color:#FFFFFF;
}
.kpi-val.pos{color:var(--green)}
.kpi-val.neg{color:var(--red)}
.kpi-val.neu{color:#FFFFFF}
.kpi-ico{
  position:absolute;right:14px;top:14px;
  font-size:22px;opacity:.12;user-select:none;
}

/* ── Chart Row ───────────────────────────────────── */
.chart-row{
  display:grid;grid-template-columns:3fr 2fr;
  gap:18px;margin-bottom:18px;
}
.card{
  background:var(--card);border:var(--border);
  border-radius:var(--radius);padding:20px 22px;
}
.card-title{font-size:13.5px;font-weight:600;margin-bottom:16px;color:#FFFFFF}
.chart-wrap{position:relative}
.chart-wrap canvas{max-height:240px}

/* ── Account Cards ────────────────────────────────── */
.acct-section-label{
  font-size:11px;color:var(--muted);font-weight:600;
  margin-bottom:10px;letter-spacing:.07em;text-transform:uppercase;
}
.acct-grid{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px}
.acct-card{
  background:#161D2E;border:var(--border);
  border-radius:var(--radius);padding:14px 16px;
  min-width:130px;flex:1;
}
.acct-name{font-size:12px;color:var(--muted);margin-bottom:6px}
.acct-val{font-size:18px;font-weight:600;color:#FFFFFF}
.acct-bar-bg{
  height:3px;background:rgba(59,130,246,.15);border-radius:4px;
  margin-top:12px;overflow:hidden;
}
.acct-bar{height:100%;background:var(--primary);border-radius:4px;transition:width .5s}
.acct-usd .acct-bar-bg{background:rgba(34,197,94,.15)}
.acct-usd .acct-bar{background:var(--green)}

/* ── Bottom Tab ───────────────────────────────────── */
.bottom-tab{
  display:none;position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);background:var(--sidebar-bg);border-top:var(--border);
  justify-content:space-around;align-items:center;z-index:200;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;
  gap:1px;font-size:10px;color:var(--muted);cursor:pointer;
  padding:6px 8px;border-radius:8px;transition:color .15s;
}
.tab-item.active{color:var(--primary)}
.tab-ico{font-size:19px}

/* ── Placeholder pages ────────────────────────────── */
.placeholder-pg{padding-top:12px}
.placeholder-pg h2{font-size:20px;font-weight:700;margin-bottom:10px}
.placeholder-pg p{color:var(--muted);font-size:14px}

/* ── Responsive ────────────────────────────────────── */
@media(max-width:1023px){
  .sidebar{display:none}
  .main{margin-left:0}
  .chart-row{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:767px){
  .bottom-tab{display:flex}
  .main{padding:18px 14px calc(var(--tab-h) + 16px)}
  .page-hd h2{font-size:18px}
  .kpi-grid{gap:10px}
  .kpi{padding:16px 14px 14px}
  .kpi-val{font-size:22px}
  .card{padding:14px 14px}
  .chart-wrap canvas{max-height:200px}
  .acct-card{min-width:100px}
}
@media(max-width:400px){
  .kpi-val{font-size:18px}
}
</style>
</head>

<!-- ═══════════════════════ SCRIPT ═══════════════════════ -->
<script>
/* ── 密碼（SHA-256 hash）
   換密碼：瀏覽器 console 執行：
   crypto.subtle.digest('SHA-256',new TextEncoder().encode('新密碼'))
     .then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
   ─────────────────────────────────────── */
const PASSWORD_HASH = "80bcbc8116c90758e6efd4740c94caab840d53dc3fe1ebe4003be10b67127eef"; // micronic

async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,"0")).join("");
}
async function unlock() {
  const hash = await sha256(document.getElementById("pw").value);
  if (hash === PASSWORD_HASH) {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    initApp();
  } else {
    document.getElementById("pw-err").textContent = "密碼錯誤，請再試一次";
  }
}
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") unlock(); });

/* ── Navigation ── */
const PAGES = ["overview","expense","stock","pnl","accounts"];
function goPage(name) {
  PAGES.forEach(p => {
    document.getElementById("page-"+p).style.display = p===name ? "" : "none";
  });
  document.querySelectorAll("[data-page]").forEach(el => {
    el.classList.toggle("active", el.dataset.page===name);
  });
}
document.querySelectorAll("[data-page]").forEach(el => {
  el.addEventListener("click", () => goPage(el.dataset.page));
});

/* ── Formatters ── */
function ntd(n) {
  if(n===null||n===undefined||isNaN(n)) return "--";
  return "NT$" + Math.round(n).toLocaleString("zh-TW");
}
function signed(n) {
  if(n===null||n===undefined||isNaN(n)) return "--";
  return (n>=0 ? "+" : "") + "NT$" + Math.round(Math.abs(n)).toLocaleString("zh-TW");
}

/* ── Category → color map（指定色 + fallback 序列）── */
const CAT_COLORS = {
  "約會":          "#3B82F6",
  "餐費":          "#F59E0B",
  "電信費":        "#10B981",
  "飲料":          "#8B5CF6",
  "交通費":        "#EF4444",
  "Apple Store":   "#EC4899",
  "Youtube":       "#F97316",
  "AI":            "#06B6D4",
  "股票抽籤":      "#6366F1",
  "零食":          "#FBBF24",
  "剪髮":          "#34D399",
  "eTag":          "#60A5FA",
  "洗車":          "#A78BFA",
  "停車":          "#FB7185",
  "健身房":        "#4ADE80",
  "氣泡水":        "#38BDF8",
  "生髮水":        "#C084FC",
  "藥藥":          "#F472B6",
  "整骨":          "#2DD4BF",
  "奢侈品":        "#FDE68A",
  "生活用品":      "#86EFAC",
  "醫藥費":        "#FCA5A5",
  "車用":          "#93C5FD",
  "電子書":        "#DDD6FE",
  "治裝":          "#FDBA74",
  "會員費":        "#A5F3FC",
};
const FALLBACK_COLORS = Object.values(CAT_COLORS);

function catColor(name, idx) {
  return CAT_COLORS[name] || FALLBACK_COLORS[idx % FALLBACK_COLORS.length];
}

/* ── Donut center-text plugin ── */
const centerTextPlugin = {
  id: "centerText",
  afterDraw(chart) {
    if (chart.config.type !== "doughnut") return;
    const {ctx, chartArea:{left,right,top,bottom}} = chart;
    const cx = (left+right)/2, cy = (top+bottom)/2;
    ctx.save();
    const total = (chart.data.datasets[0]?.data||[]).reduce((a,b)=>a+b, 0);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "500 11px system-ui";
    ctx.fillStyle = "#8B95A9";
    ctx.fillText("本月支出", cx, cy - 12);
    ctx.font = "700 14px system-ui";
    ctx.fillStyle = "#FFFFFF";
    ctx.fillText("NT$"+Math.round(total).toLocaleString("zh-TW"), cx, cy + 8);
    ctx.restore();
  }
};
Chart.register(centerTextPlugin);

/* ── Main init ── */
const charts = {};

function initApp() {
  let data = {};
  try {
    const raw = document.getElementById("injected-data").textContent.trim();
    data = JSON.parse(raw);
  } catch(e) { console.error("Data parse error", e); }

  const month = data.current_month ?? new Date().getMonth()+1;

  document.getElementById("month-badge").textContent   = month + "月";
  document.getElementById("sb-month").textContent      = month + "月";
  document.getElementById("sb-updated").textContent    = "更新：" + (data.generated_at || "--");
  document.getElementById("updated-label").textContent = "更新：" + (data.generated_at || "--");

  // KPI
  document.getElementById("kpi-total").textContent   = ntd(data.total_assets);
  document.getElementById("kpi-expense").textContent = ntd(data.monthly_expense);
  document.getElementById("kpi-avg").textContent     = ntd(data.avg_daily);

  const pnlEl = document.getElementById("kpi-pnl");
  const pnl = data.stock_daily_pnl ?? 0;
  pnlEl.textContent = signed(pnl);
  pnlEl.className   = "kpi-val " + (pnl > 0 ? "pos" : pnl < 0 ? "neg" : "neu");

  renderTrend(data.trend || []);
  renderDonut(data.category_sum || {});
  renderAccounts(data.accounts_twd || [], data.accounts_usd || []);
}

/* ── Trend chart ── */
function renderTrend(trend) {
  const labels = trend.map(d => d.month);
  const values = trend.map(d => d.total || 0);
  const ctx = document.getElementById("chart-trend").getContext("2d");

  // 漸層填色
  const grad = ctx.createLinearGradient(0, 0, 0, 260);
  grad.addColorStop(0,   "rgba(59,130,246,0.30)");
  grad.addColorStop(1,   "rgba(59,130,246,0.00)");

  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "總資產",
        data: values,
        borderColor: "#3B82F6",
        backgroundColor: grad,
        borderWidth: 2.5,
        pointRadius: 5,
        pointBackgroundColor: "#3B82F6",
        pointBorderColor: "#1E2433",
        pointBorderWidth: 2,
        tension: 0.35,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1E2433",
          borderColor: "#2A3147",
          borderWidth: 1,
          titleColor: "#8B95A9",
          bodyColor: "#FFFFFF",
          callbacks: {
            label: c => "  NT$" + Math.round(c.parsed.y).toLocaleString("zh-TW")
          }
        }
      },
      scales: {
        y: {
          ticks: {
            color: "#8B95A9",
            callback: v => {
              if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1) + "M";
              if (Math.abs(v) >= 1e4) return (v/1e4).toFixed(0) + "萬";
              return v;
            },
            font: { size: 10 }
          },
          grid: { color: "rgba(255,255,255,0.06)" },
          border: { color: "transparent" }
        },
        x: {
          ticks: { color: "#8B95A9", font: { size: 10 }, maxRotation: 45 },
          grid: { display: false },
          border: { color: "rgba(255,255,255,0.06)" }
        }
      }
    }
  });
}

/* ── Donut chart ── */
function renderDonut(catSum) {
  const entries = Object.entries(catSum)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1]-a[1]);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  const colors = entries.map(([k],i) => catColor(k, i));

  const ctx = document.getElementById("chart-donut").getContext("2d");
  if (charts.donut) charts.donut.destroy();

  if (!labels.length) {
    charts.donut = new Chart(ctx, {
      type: "doughnut",
      data: { labels:["暫無資料"], datasets:[{data:[1],backgroundColor:["#2A3147"],borderWidth:0}] },
      options: {
        responsive:true, cutout:"62%",
        plugins:{ legend:{display:false}, tooltip:{enabled:false} }
      }
    });
    return;
  }

  charts.donut = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: "#1E2433",
        hoverBorderColor: "#1E2433",
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: "62%",
      plugins: {
        legend: {
          position: "right",
          labels: {
            color: "#8B95A9",
            font: { size: 10 },
            boxWidth: 10,
            padding: 7,
            generateLabels(chart) {
              const ds = chart.data.datasets[0];
              const total = ds.data.reduce((a,b)=>a+b, 0);
              return chart.data.labels.map((label, i) => ({
                text: `${label}  NT$${Math.round(ds.data[i]).toLocaleString("zh-TW")}`,
                fillStyle: ds.backgroundColor[i],
                hidden: false,
                index: i,
              }));
            }
          }
        },
        tooltip: {
          backgroundColor: "#1E2433",
          borderColor: "#2A3147",
          borderWidth: 1,
          titleColor: "#FFFFFF",
          bodyColor: "#8B95A9",
          callbacks: {
            label: c => {
              const total = c.dataset.data.reduce((a,b)=>a+b, 0);
              const pct = (c.parsed/total*100).toFixed(1);
              return ` NT$${Math.round(c.parsed).toLocaleString("zh-TW")}（${pct}%）`;
            }
          }
        }
      }
    }
  });
}

/* ── Account cards ── */
function renderAccounts(twd, usd) {
  const twdTotal = twd.reduce((s,a) => s + a.balance, 0);
  const twdEl    = document.getElementById("acct-twd");
  const usdEl    = document.getElementById("acct-usd");

  if (!twd.length) {
    twdEl.innerHTML = `<p style="color:var(--muted);font-size:13px">無台幣帳戶資料</p>`;
    document.getElementById("acct-twd-label").style.display = "none";
  } else {
    twdEl.innerHTML = twd.map(a => {
      const pct = twdTotal ? (a.balance / twdTotal * 100).toFixed(1) : 0;
      return `
        <div class="acct-card">
          <div class="acct-name">${a.name}</div>
          <div class="acct-val">NT$${Math.round(a.balance).toLocaleString("zh-TW")}</div>
          <div class="acct-bar-bg">
            <div class="acct-bar" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join("");
  }

  if (!usd.length) {
    usdEl.innerHTML = `<p style="color:var(--muted);font-size:13px">無外幣帳戶資料</p>`;
    document.getElementById("acct-usd-label").style.display = "none";
  } else {
    const usdTotal = usd.reduce((s,a) => s + a.balance, 0);
    usdEl.innerHTML = usd.map(a => {
      const pct = usdTotal ? (a.balance / usdTotal * 100).toFixed(1) : 0;
      return `
        <div class="acct-card acct-usd">
          <div class="acct-name">
            ${a.name}
            <span style="font-size:9px;background:rgba(34,197,94,.15);color:#22C55E;
                         padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:600">USD</span>
          </div>
          <div class="acct-val">$${a.balance.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div class="acct-bar-bg acct-usd-bar-bg">
            <div class="acct-bar" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join("");
  }
}
</script>
