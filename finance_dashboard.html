<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>2026年記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230866FF'/><path d='M18 50c0-8 5-14 12-14 4 0 8 2 12 7l8 10 8-10c4-5 8-7 12-7 7 0 12 6 12 14s-5 14-12 14c-4 0-8-2-12-7l-8-10-8 10c-4 5-8 7-12 7C23 64 18 58 18 50z' fill='white'/></svg>">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --primary:#00C896;
  --primary-dim:rgba(0,200,150,0.12);
  --amber:#F5A623;
  --amber-dim:rgba(245,166,35,0.18);
  --blue:#4A9EFF;
  --blue-dim:rgba(74,158,255,0.18);
  --purple:#A78BFA;
  --purple-dim:rgba(167,139,250,0.18);
  --green:#4ADE80;
  --green-dim:rgba(74,222,128,0.15);
  --red:#F87171;
  --red-dim:rgba(248,113,113,0.18);
  --bg:#13151A;
  --sidebar-bg:#1A1D24;
  --card:#1E2130;
  --card2:#252836;
  --border:rgba(255,255,255,0.06);
  --text:#FFFFFF;
  --muted:#8B95A9;
  --radius:16px;
  --sidebar-w:220px;
  --header-h:64px;
  --tab-h:62px;
}

html,body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2A2D3E;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3A3E52}

/* ════════════════════════════════════════
   PASSWORD GATE
════════════════════════════════════════ */
#gate{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%,rgba(0,200,150,0.06) 0%,#13151A 60%);
  display:flex;align-items:center;justify-content:center;
}
.gate-box{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:48px 40px 40px;width:min(380px,92vw);text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
.gate-icon{font-size:48px;margin-bottom:16px}
.gate-title{font-size:22px;font-weight:700;margin-bottom:6px}
.gate-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.gate-inp{
  width:100%;padding:13px 16px;
  background:#13151A;border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  font-size:16px;font-family:inherit;outline:none;color:#fff;
  caret-color:var(--primary);transition:border-color .2s,box-shadow .2s;
}
.gate-inp::placeholder{color:#2A3147}
.gate-inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,200,150,0.15)}
.gate-btn{
  margin-top:14px;width:100%;padding:14px;
  background:var(--primary);color:#13151A;
  border:none;border-radius:12px;font-size:16px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;
}
.gate-btn:hover{opacity:.88}
.gate-btn:active{transform:scale(.98)}
.gate-err{min-height:20px;margin-top:10px;font-size:13px;color:var(--red)}

/* ════════════════════════════════════════
   APP SHELL — three-area layout
════════════════════════════════════════ */
#app{display:none;height:100vh;overflow:hidden}

.app-shell{
  display:flex;height:100%;overflow:hidden;
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--sidebar-bg);
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}

.sb-logo{
  height:var(--header-h);
  display:flex;align-items:center;gap:10px;
  padding:0 20px;flex-shrink:0;
}
.sb-logo-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--primary),#00A87A);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,200,150,0.35);
}
.sb-logo-text{font-size:16px;font-weight:700;color:var(--text)}

.sb-nav{flex:1;overflow-y:auto;padding:8px 10px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:48px;
  font-size:13.5px;font-weight:500;cursor:pointer;
  color:var(--muted);
  border-left:3px solid transparent;
  border-radius:8px;
  margin-bottom:2px;
  transition:background .15s,color .15s,border-color .15s;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:#C8D0E0}
.nav-item.active{
  background:var(--primary-dim);
  border-left-color:var(--primary);
  border-radius:0 8px 8px 0;
  color:var(--text);
}
.nav-icon{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.nav-icon svg{
  width:16px;height:16px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}

.sb-bottom{padding:16px 10px 24px;flex-shrink:0}
.sb-source-card{
  background:var(--card2);border-radius:12px;padding:14px 16px;
}
.sb-source-title{
  font-size:10.5px;color:var(--muted);font-weight:500;
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;
}
.sb-source-row{display:flex;align-items:center;gap:8px}
.sb-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--primary);flex-shrink:0;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,200,150,0.5)}
  50%{opacity:.85;box-shadow:0 0 0 5px rgba(0,200,150,0)}
}
.sb-source-name{font-size:13px;color:var(--text);font-weight:500}

/* ════════════════════════════════════════
   LAYOUT RIGHT
════════════════════════════════════════ */
.layout-right{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
}
.topbar-title{font-size:22px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}

/* Month pills */
.month-switcher{
  display:flex;align-items:center;
  background:var(--card);border-radius:24px;padding:4px;gap:2px;
}
.month-pill{
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;color:var(--muted);transition:background .15s,color .15s;
}
.month-pill.active{background:var(--primary);color:#13151A;font-weight:600}
.month-pill:not(.active):hover{color:var(--text)}
.updated-text{font-size:12px;color:var(--muted);white-space:nowrap}

/* ════════════════════════════════════════
   SCROLL AREA + MAIN
════════════════════════════════════════ */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden}
.main{padding:24px 28px 56px}

/* ════════════════════════════════════════
   KPI GRID
════════════════════════════════════════ */
.kpi-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:16px;margin-bottom:18px;
}
.kpi-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px 20px 20px;
  transition:transform .2s ease,box-shadow .2s ease;
}
.kpi-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(0,0,0,.35);
}
.kpi-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:18px;
}
.kpi-circle{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.kpi-circle svg{
  width:24px;height:24px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}
.kpi-dots{color:var(--muted);font-size:18px;line-height:1;cursor:pointer;letter-spacing:1px}
.kpi-label{font-size:13px;color:var(--muted);font-weight:400;margin-bottom:8px}
.kpi-value{
  font-size:30px;font-weight:700;line-height:1.1;
  color:var(--text);word-break:break-all;
}
.kpi-value.pos{color:var(--green)}
.kpi-value.neg{color:var(--red)}
.kpi-footer{margin-top:14px;display:flex;align-items:center;gap:6px}
.kpi-trend{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;
  padding:3px 9px;border-radius:100px;
}
.kpi-trend svg{
  width:14px;height:14px;stroke:currentColor;fill:none;
  stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
}
.kpi-trend.up{background:rgba(74,222,128,0.14);color:var(--green)}
.kpi-trend.down{background:rgba(248,113,113,0.14);color:var(--red)}
.kpi-trend.neutral{background:rgba(255,255,255,0.05);color:var(--muted)}

/* Card-level month pills */
.card-month-pills{display:flex;align-items:center;gap:2px}
.card-month-pill{
  padding:3px 8px;border-radius:10px;font-size:11px;font-weight:500;
  cursor:pointer;color:var(--muted);transition:background .15s,color .15s;
}
.card-month-pill.active{background:var(--primary);color:#13151A;font-weight:600}
.card-month-pill:not(.active):hover{color:var(--text)}

/* Eye button */
.kpi-eye-btn{
  background:none;border:none;cursor:pointer;
  color:var(--muted);padding:2px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:color .15s;
}
.kpi-eye-btn:hover{color:var(--text)}
.kpi-eye-btn svg{
  width:18px;height:18px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}

/* ════════════════════════════════════════
   GENERIC CARD
════════════════════════════════════════ */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;
  transition:transform .2s ease,box-shadow .2s ease;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-tag{
  font-size:11px;color:var(--muted);
  background:var(--card2);padding:4px 10px;border-radius:8px;cursor:pointer;
  white-space:nowrap;
}

/* ════════════════════════════════════════
   CHARTS ROW
════════════════════════════════════════ */
.charts-row{display:flex;gap:12px;margin-bottom:18px}
.chart-col-donut{flex:55;min-width:0}
.chart-col-trend{flex:45;min-width:0}

/* Donut layout */
.donut-inner{display:flex;gap:16px;align-items:center;justify-content:center}
.donut-canvas-wrap{width:150px;flex-shrink:0}
.donut-legend{
  display:flex;flex-direction:column;gap:8px;
  max-height:200px;overflow-y:auto;
  width:fit-content;min-width:160px;max-width:200px;
}
.legend-row{display:flex;align-items:center;gap:8px;white-space:nowrap}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:12px;color:var(--muted);flex:1}
.legend-right{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap}

/* Trend chart */
.chart-wrap canvas{max-height:220px}

/* ════════════════════════════════════════
   BOTTOM ROW
════════════════════════════════════════ */
.bottom-row{display:flex;gap:16px}
.bottom-col-cat{flex:60;min-width:0}
.bottom-col-acct{flex:40;min-width:0}

/* Category table */
.cat-table{width:100%;border-collapse:collapse}
.cat-table th{
  font-size:11px;color:var(--muted);font-weight:500;
  text-align:left;padding:0 0 8px;
  border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.04em;
}
.cat-table th:nth-child(2){text-align:center}
.cat-table th:last-child{text-align:right}
.cat-table td{
  padding:7px 0;font-size:12.5px;color:var(--text);
  border-bottom:1px solid rgba(255,255,255,0.04);
  vertical-align:middle;
}
.cat-table td:nth-child(2){text-align:center}
.cat-table td:last-child{text-align:right}
.cat-table tr:last-child td{border-bottom:none}
.cat-cell{display:flex;align-items:center;gap:9px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-pct-badge{
  font-size:11px;color:var(--muted);
  background:rgba(255,255,255,0.06);
  padding:2px 7px;border-radius:10px;
}

/* Account list */
.acct-section-label{
  font-size:10.5px;color:var(--muted);font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;
}
.acct-list-item{margin-bottom:14px}
.acct-list-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:7px;
}
.acct-list-name{font-size:13px;color:var(--muted)}
.acct-list-amount{font-size:13px;font-weight:600;color:var(--text)}
.acct-bar-bg{height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.acct-bar{height:100%;border-radius:4px;transition:width .6s ease}
.acct-bar.twd{background:var(--primary)}
.acct-bar.usd{background:var(--amber)}
.acct-sep{height:1px;background:var(--border);margin:18px 0}
.acct-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:14px;border-top:1px solid var(--border);
}
.acct-total-label{font-size:12px;color:var(--muted)}
.acct-total-val{font-size:15px;font-weight:700;color:var(--primary)}

/* USD tag */
.usd-tag{
  font-size:9px;background:rgba(74,222,128,0.15);color:var(--green);
  padding:1px 5px;border-radius:4px;margin-left:5px;font-weight:600;
}

/* ════════════════════════════════════════
   PLACEHOLDER PAGES
════════════════════════════════════════ */
.placeholder-pg{padding-top:16px}
.placeholder-pg h2{font-size:20px;font-weight:700;margin-bottom:10px}
.placeholder-pg p{color:var(--muted);font-size:14px}

/* ════════════════════════════════════════
   MOBILE BOTTOM TAB
════════════════════════════════════════ */
.bottom-tab{
  display:none;position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);background:var(--sidebar-bg);
  border-top:1px solid var(--border);
  justify-content:space-around;align-items:center;z-index:200;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;
  gap:2px;font-size:10px;color:var(--muted);
  cursor:pointer;padding:6px 10px;border-radius:10px;transition:color .15s;
}
.tab-item.active{color:var(--primary)}
.tab-ico{font-size:20px}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media(max-width:1280px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:1023px){
  .charts-row{flex-direction:column}
  .chart-col-donut,.chart-col-trend{flex:none}
  .bottom-row{flex-direction:column}
  .bottom-col-cat,.bottom-col-acct{flex:none}
}
@media(max-width:768px){
  .sidebar{display:none}
  .bottom-tab{display:flex}
  .main{padding:16px 14px calc(var(--tab-h) + 20px)}
  .topbar{padding:0 16px}
  .topbar-title{font-size:18px}
  .month-switcher{display:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .kpi-value{font-size:22px}
  .kpi-circle{width:44px;height:44px}
  .kpi-circle svg{width:20px;height:20px}
  .donut-inner{flex-direction:column}
  .donut-canvas-wrap{width:100%;max-width:190px;margin:0 auto}
}
@media(max-width:420px){
  .kpi-value{font-size:18px}
  .kpi-grid{gap:8px}
}
</style>
</head>
<body>

<!-- ═══════════════════════ PASSWORD GATE ═══════════════════════ -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-icon">🔐</div>
    <div class="gate-title">2026年記帳</div>
    <div class="gate-sub">請輸入密碼以進入儀表板</div>
    <input id="pw" type="password" class="gate-inp" placeholder="密碼"
           autocomplete="current-password"/>
    <button class="gate-btn" onclick="unlock()">進入</button>
    <div class="gate-err" id="pw-err"></div>
  </div>
</div>

<!-- ═══════════════════════ APP ═══════════════════════ -->
<div id="app">
<div class="app-shell">

  <!-- ════ SIDEBAR ════ -->
  <aside class="sidebar">

    <div class="sb-logo">
      <div class="sb-logo-icon">💰</div>
      <div class="sb-logo-text">2026年記帳</div>
    </div>

    <nav class="sb-nav">
      <div class="nav-item active" data-page="overview">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        </span>
        總覽
      </div>
      <div class="nav-item" data-page="expense">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
        </span>
        消費明細
      </div>
      <div class="nav-item" data-page="stock">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </span>
        股票資產
      </div>
      <div class="nav-item" data-page="pnl">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        已實現損益
      </div>
      <div class="nav-item" data-page="accounts">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/></svg>
        </span>
        帳戶總覽
      </div>
    </nav>

    <div class="sb-bottom">
      <div class="sb-source-card">
        <div class="sb-source-title">資料來源</div>
        <div class="sb-source-row">
          <div class="sb-dot"></div>
          <div class="sb-source-name">Google Sheets</div>
        </div>
      </div>
    </div>

  </aside><!-- .sidebar -->

  <!-- ════ LAYOUT RIGHT ════ -->
  <div class="layout-right">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title" id="topbar-title">財務總覽</h1>
      </div>
      <div class="topbar-right">
        <span class="updated-text" id="updated-label">載入中…</span>
        <div class="month-switcher" id="month-switcher"></div>
      </div>
    </header>

    <!-- SCROLL AREA -->
    <div class="scroll-area">

      <!-- ── Overview Page ── -->
      <div id="page-overview" class="main">

        <!-- KPI Cards -->
        <div class="kpi-grid">

          <!-- 總資產（預設隱藏，眼睛 icon 切換） -->
          <div class="kpi-card">
            <div class="kpi-top">
              <div class="kpi-circle" style="background:var(--amber-dim);color:var(--amber)">

/* ── CSV 解析（正確處理引號內嵌換行）── */
function parseCsv(txt) {
  const rows = [];
  let row = [], f = '', inQ = false;
  for (let i = 0; i < txt.length; i++) {
    const c = txt[i];
    if (c === '"') {
      if (inQ && txt[i+1] === '"') { f += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(f.trim()); f = '';
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && txt[i+1] === '\n') i++;
      row.push(f.trim()); f = '';
      if (row.length > 1 || row[0]) rows.push(row);
      row = [];
    } else {
      f += c;
    }
  }
  if (row.length || f) { row.push(f.trim()); if (row.length > 1 || row[0]) rows.push(row); }
  return rows;
}
function cell(rows, r, c) { try { return (rows[r]?.[c] ?? '').trim(); } catch { return ''; } }
function parseNum(s) {
  if (!s) return 0;
  const v = String(s).replace(/[NT$,\s%]/g, '').replace('(', '-').replace(')', '');
  return parseFloat(v) || 0;
}

async function fetchCsv(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const resp = await fetch(url, {cache: 'no-store'});
  if (!resp.ok) throw new Error(`GID ${gid} HTTP ${resp.status}`);
  const txt = await resp.text();
  if (txt.trim().startsWith('<')) throw new Error('試算表未設為公開');
  return parseCsv(txt);
}

/* ── Formatters ── */
function ntd(n) {
  if (n === null || n === undefined || isNaN(n)) return "--";
  return "NT$" + Math.round(n).toLocaleString("zh-TW");
}
function signed(n) {
  if (n === null || n === undefined || isNaN(n)) return "--";
  const abs = Math.round(Math.abs(n)).toLocaleString("zh-TW");
  return (n >= 0 ? "+" : "-") + "NT$" + abs;
}

/* ── 密碼（SHA-256 hash）── */
const PASSWORD_HASH = "80bcbc8116c90758e6efd4740c94caab840d53dc3fe1ebe4003be10b67127eef";

async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,"0")).join("");
}

/* ── 解析月分頁 → {totalExpense, avgDaily, categories} ── */
function parseMonthSheet(rows, month) {
  const totalExpense = parseNum(cell(rows, 2, 37));  // AL3 (0-indexed: row=2, col=37)
  const avgDaily     = parseNum(cell(rows, 7, 37));  // AL8 (0-indexed: row=7, col=37)
  const catSum = {};
  CATEGORIES.forEach(c => catSum[c] = 0);
  const today = new Date();
  const isCurr = (month === today.getMonth()+1 && today.getFullYear() === 2026);
  const maxDay = isCurr ? today.getDate() : (rows.length - 1);
  for (let ri = 1; ri <= maxDay && ri < rows.length; ri++) {
    const row = rows[ri];
    for (let g = 0; g < 6; g++) {
      const base = 1 + g*5;
      const amt = parseNum(row[base+1] || '');
      const cat = (row[base+4] || '').trim();
      if (amt > 0 && cat in catSum) catSum[cat] += amt;
    }
  }
  const categories = Object.fromEntries(
    Object.entries(catSum).filter(([,v]) => v > 0).map(([k,v]) => [k, Math.round(v)])
  );
  return { totalExpense: Math.round(totalExpense), avgDaily: Math.round(avgDaily), categories };
}

/* ── 全資料 fetch & render（初始化 + 每5分鐘刷新）── */
async function fetchAndRenderAll(month) {
  try {
    document.getElementById("updated-label").textContent = "更新中…";

    const [rowsAcct, rowsHist, rowsAssets, rowsMonth] = await Promise.all([
      fetchCsv(GID_ACCOUNTS),
      fetchCsv(GID_HISTORY),
      fetchCsv(GID_ASSETS),
      fetchCsv(MONTH_GIDS[String(month)])
    ]);

    /* 1. 總資產來源邏輯：
       - 當前月份（今天實際月份）→ 帳戶分頁 O4 (row=3, col=14)
       - 過去月份 → 歷史結算分頁 F欄 (col=5)，row = 20+month */
    const todayMonth = new Date().getMonth() + 1;
    const prevHistRow = 19 + month;   // 上月（1月→row20=F21，依此類推）
    const currHistRow = 20 + month;   // 當月歷史列（過去月份用）

    console.log("[帳戶] row3 all cols:", rowsAcct[3], "| length:", rowsAcct[3]?.length, "| col14 (O4):", rowsAcct[3]?.[14]);

    let totalAssets;
    if (month === todayMonth) {
      /* 當前月份：用帳戶分頁即時值 O4 */
      totalAssets = parseNum(cell(rowsAcct, 3, 14));
    } else {
      /* 過去月份：用歷史結算 F 欄 */
      console.log("[歷史結算] month="+month+" row="+currHistRow+":", rowsHist[currHistRow], "| col5:", rowsHist[currHistRow]?.[5]);
      totalAssets = parseNum(cell(rowsHist, currHistRow, 5));
    }
    lastTotalAssets = totalAssets;
    const totalEl = document.getElementById("kpi-total");
    if (totalEl) totalEl.textContent = totalAssetsHidden ? "NT$ ••••••" : ntd(totalAssets);

    /* 趨勢資料 (D欄=col3 row8起, P欄=col15 row8起) */
    const trend = [];
    for (let ri = 8; ri < rowsAcct.length; ri++) {
      const yr  = cell(rowsAcct, ri, 3);
      const val = parseNum(cell(rowsAcct, ri, 15));
      if (yr && val) trend.push({month: yr, total: val});
    }
    renderTrend(trend);

    /* MoM 漲跌% — 上月總資產一律從歷史結算 F 欄取 */
    const prevTotal = parseNum(cell(rowsHist, prevHistRow, 5));
    const momEl = document.getElementById("kpi-mom");
    if (momEl) {
      if (prevTotal > 0) {
        const pct = (totalAssets - prevTotal) / prevTotal * 100;
        const up  = pct >= 0;
        momEl.className  = "kpi-trend " + (up ? "up" : "down");
        momEl.textContent = up ? `↑+${pct.toFixed(2)}%` : `↓-${Math.abs(pct).toFixed(2)}%`;
      } else {
        momEl.className  = "kpi-trend neutral";
        momEl.textContent = "整體資產規模";
      }
    }

    /* 1. 股票今日損益 P17 (row=16, col=15) & L17 (row=16, col=11) */
    console.log("[資產配置] row16 (P17/L17) all cols:", rowsAssets[16]);
    const stockPnl = parseNum(cell(rowsAssets, 16, 15));
    const stockPct = parseNum(cell(rowsAssets, 16, 11));
    renderStockPnl(stockPnl, stockPct);

    /* 6. 月份資料 AL3/AL8 (col=37) — console.log 確認 */
    console.log("[月份"+month+"] row2 (0-indexed=2):", rowsMonth[2], "| cols:", rowsMonth[2]?.length, "| col37 (AL3):", rowsMonth[2]?.[37]);
    renderMonthData(rowsMonth, month);

    /* 帳戶（硬編碼） */
    renderAccountList(HARDCODED_TWD, HARDCODED_USD);

    document.getElementById("updated-label").textContent = "更新：" + new Date().toLocaleTimeString("zh-TW");
  } catch(e) {
    console.error("[fetchAndRenderAll] 資料載入失敗：", e);
    document.getElementById("updated-label").textContent = "載入失敗：" + e.message.slice(0,30);
  }
}

/* ── Main init ── */
function initApp() {
  /* 決定當前月份，夾在已知月份範圍內 */
  const today = new Date();
  const curM  = today.getMonth() + 1;
  const avail = Object.keys(MONTH_GIDS).map(Number);
  activeMonth = avail.includes(curM) ? curM : Math.max(...avail);

  buildAllMonthPills(activeMonth);

  /* 13. 全資料即時 fetch，不依賴靜態資料 */
  fetchAndRenderAll(activeMonth);

  /* 5分鐘自動刷新全部資料 */
  setInterval(() => fetchAndRenderAll(activeMonth), 5 * 60 * 1000);
}

/* ── Donut center-text plugin ── */
const centerTextPlugin = {
  id: "centerText",
  afterDraw(chart) {
    if (chart.config.type !== "doughnut") return;
    const { ctx, chartArea: { left, right, top, bottom } } = chart;
    const cx = (left + right) / 2, cy = (top + bottom) / 2;
    ctx.save();
    const total = (chart.data.datasets[0]?.data || []).reduce((a,b) => a+b, 0);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "400 10.5px Inter,system-ui";
    ctx.fillStyle = "#8B95A9";
    ctx.fillText("本月支出", cx, cy - 11);
    ctx.font = "700 13px Inter,system-ui";
    ctx.fillStyle = "#FFFFFF";
    ctx.fillText("NT$" + Math.round(total).toLocaleString("zh-TW"), cx, cy + 7);
    ctx.restore();
  }
};
Chart.register(centerTextPlugin);

/* ── Charts instance store ── */
const charts = {};

/* ── Trend chart ── */
function renderTrend(trend) {
  const labels = trend.map(d => d.month);
  const values = trend.map(d => d.total || 0);
  const ctx    = document.getElementById("chart-trend").getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, 0, 220);
  grad.addColorStop(0, "rgba(0,200,150,0.20)");
  grad.addColorStop(1, "rgba(0,200,150,0.00)");

  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "總資產",
        data: values,
        borderColor: "#00C896",
        backgroundColor: grad,
        borderWidth: 2.5,
        pointRadius: 5,
        pointBackgroundColor: "#00C896",
        pointBorderColor: "#1E2130",
        pointBorderWidth: 2,
        tension: 0.4,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#252836",
          borderWidth: 0,
          titleColor: "#8B95A9",
          bodyColor: "#FFFFFF",
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: c => "  NT$" + Math.round(c.parsed.y).toLocaleString("zh-TW")
          }
        }
      },
      scales: {
        y: {
          ticks: {
            color: "#8B95A9",
            callback: v => {
              if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1) + "M";
              if (Math.abs(v) >= 1e4) return (v/1e4).toFixed(0) + "萬";
              return v;
            },
            font: { size: 10, family: "Inter" }
          },
          grid: { color: "rgba(255,255,255,0.04)" },
          border: { color: "transparent" }
        },
        x: {
          ticks: { color: "#8B95A9", font: { size: 10, family: "Inter" }, maxRotation: 0 },
          grid: { display: false },
          border: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });
}

/* ── Donut chart ── */
function renderDonut(catSum) {
  const entries = Object.entries(catSum).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  const labels  = entries.map(([k]) => k);
  const values  = entries.map(([,v]) => v);
  const colors  = entries.map(([k], i) => catColor(k, i));

  const ctx = document.getElementById("chart-donut").getContext("2d");
  if (charts.donut) charts.donut.destroy();

  if (!labels.length) {
    charts.donut = new Chart(ctx, {
      type: "doughnut",
      data: { labels:["暫無資料"], datasets:[{data:[1],backgroundColor:["#252836"],borderWidth:0}] },
      options: { responsive:true, cutout:"68%", plugins:{legend:{display:false},tooltip:{enabled:false}} }
    });
    document.getElementById("donut-legend").innerHTML =
      `<div style="color:var(--muted);font-size:13px;padding-top:8px">暫無資料</div>`;
    return;
  }

  charts.donut = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: "#1E2130",
        hoverBorderColor: "#1E2130",
        hoverOffset: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: "68%",
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#252836",
          borderWidth: 0,
          titleColor: "#FFFFFF",
          bodyColor: "#8B95A9",
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: c => {
              const t = c.dataset.data.reduce((a,b) => a+b, 0);
              return ` NT$${Math.round(c.parsed).toLocaleString("zh-TW")}（${(c.parsed/t*100).toFixed(1)}%）`;
            }
          }
        }
      }
    }
  });

  document.getElementById("donut-legend").innerHTML = entries.map(([label, val], i) => `
    <div class="legend-row">
      <div class="legend-dot" style="background:${colors[i]}"></div>
      <span class="legend-name">${label}</span>
      <span class="legend-right">NT$${Math.round(val).toLocaleString("zh-TW")}</span>
    </div>`).join("");
}

/* ── Category table ── */
function renderCategoryTable(catSum) {
  const entries = Object.entries(catSum).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  const total   = entries.reduce((s,[,v]) => s+v, 0);
  const tbody   = document.getElementById("cat-table-body");

  if (!entries.length) {
    tbody.innerHTML = `<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:28px 0">暫無消費資料</td></tr>`;
    return;
  }

  tbody.innerHTML = entries.map(([cat, amt], i) => {
    const pct   = total ? (amt / total * 100).toFixed(1) : 0;
    const color = catColor(cat, i);
    return `
      <tr>
        <td>
          <div class="cat-cell">
            <div class="cat-dot" style="background:${color}"></div>
            <span>${cat}</span>
          </div>
        </td>
        <td><span class="cat-pct-badge">${pct}%</span></td>
        <td style="color:var(--red);font-weight:500">NT$${Math.round(amt).toLocaleString("zh-TW")}</td>
      </tr>`;
  }).join("");
}

/* ── Account list ── */
function renderAccountList(twd, usd) {
  const el       = document.getElementById("acct-list");
  const twdTotal = twd.reduce((s,a) => s + a.balance, 0);
  const usdTotal = usd.reduce((s,a) => s + a.balance, 0);
  let html = "";

  if (twd.length) {
    html += `<div class="acct-section-label">台幣帳戶</div>`;
    html += twd.map(a => {
      const pct = twdTotal ? (a.balance / twdTotal * 100).toFixed(1) : 0;
      return `
        <div class="acct-list-item">
          <div class="acct-list-top">
            <span class="acct-list-name">${a.name}</span>
            <span class="acct-list-amount">NT$${Math.round(a.balance).toLocaleString("zh-TW")}</span>
          </div>
          <div class="acct-bar-bg">
            <div class="acct-bar twd" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join("");
  }

  if (usd.length) {
    if (twd.length) html += `<div class="acct-sep"></div>`;
    html += `<div class="acct-section-label">外幣帳戶</div>`;
    html += usd.map(a => {
      const pct = usdTotal ? (a.balance / usdTotal * 100).toFixed(1) : 0;
      return `
        <div class="acct-list-item">
          <div class="acct-list-top">
            <span class="acct-list-name">${a.name}<span class="usd-tag">USD</span></span>
            <span class="acct-list-amount">$${a.balance.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          </div>
          <div class="acct-bar-bg">
            <div class="acct-bar usd" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join("");
  }

  if (!twd.length && !usd.length) {
    html = `<p style="color:var(--muted);font-size:13px">暫無帳戶資料</p>`;
  }

  if (twd.length) {
    html += `
      <div class="acct-total-row">
        <span class="acct-total-label">台幣存款合計</span>
        <span class="acct-total-val">NT$${Math.round(twdTotal).toLocaleString("zh-TW")}</span>
      </div>`;
  }

  el.innerHTML = html;
}
</script>
