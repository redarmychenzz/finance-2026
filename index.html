<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的記帳</title>
<!-- 網頁 icon（相對路徑，適用 GitHub Pages 子路徑 /finance-2026/） -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
<style>
  :root{
    --bg:#000000;
    --card-bg:#1c1c1e;
    --green:#3dd651;
    --green-d:#28b84e;
    --purple:#6c5ce7;
    --purple-d:#4b3fc4;
    --pale:#c9d4ef;
    /* 六項色塊配色（ΔE≥43.7、深色文字對比 ≥8.1） */
    --bank:#63bd6b;        /* 銀行帳戶 綠 */
    --tw_stock:#ef8b68;    /* 台股 橘 */
    --sub_broker:#f9e36d;  /* 複委託 黃 */
    --overseas:#d4aaea;    /* 海外券商 粉紫 */
    --daily:#c9d4ef;       /* 日常消費 淡藍（沿用原負債色） */
    --blue-accent:#8b93f0;
    --twd:#5b8def;         /* 台幣占比色塊 藍 */
    --usd:#46c95f;         /* 美金占比色塊 綠 */
    --txt:#ffffff;
    --txt2:rgba(255,255,255,0.5);
    --txt3:rgba(255,255,255,0.32);
    --sheet:#1c1c1f;
    --ease:cubic-bezier(0.22,1,0.36,1);
    /* 收合用對稱曲線：起步/收尾速度一致，不會先猛衝再拖尾 */
    --ease-close:cubic-bezier(0.4,0,0.25,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Helvetica Neue",sans-serif;overflow:hidden;}
  svg{display:block;}
  #phone{position:relative;width:100%;max-width:430px;height:100vh;height:100dvh;max-height:932px;margin:0 auto;background:var(--bg);overflow:hidden;}
  .ib{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

  /* ===== 首頁 ===== */
  /* 上方留白：吃 safe-area（手機貼齊瀏海下緣、桌機縮小） */
  #home{position:absolute;inset:0;padding:max(20px, env(safe-area-inset-top, 20px)) 20px 100px;z-index:1;overflow-y:auto;}
  .head{position:relative;}
  .nw-lbl{font-size:15px;color:var(--txt2);display:flex;align-items:center;gap:7px;opacity:0;transform:translateY(10px);}
  .nw-val{font-size:33px;font-weight:800;letter-spacing:-0.5px;margin-top:2px;margin-bottom:18px;display:inline-block;max-width:100%;cursor:pointer;opacity:0;transform:translateY(10px);transition:transform 120ms ease-out;}
  .nw-val:active{transform:scale(0.98);}
  .add{position:absolute;right:0;top:-4px;width:52px;height:52px;border-radius:50%;background:var(--blue-accent);border:none;color:#111;
    display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:scale(0.7);transition:transform 120ms ease-out;}
  .add:active{transform:scale(0.88);}

  .stack{position:relative;}
  /* 左側色塊 */
  /* 左側色塊：整體一個圓角矩形，內部色段無縫相連（只有最上緣/最下緣有圓角）
     依截圖擬合：右緣 54.7px、圓角 34.4px、與卡片間隔 20px（平均誤差 0.52px） */
  /* 眼睛切換：顯示/隱藏金額 */
  .eye-btn{background:none;border:none;padding:2px 4px;margin:0;color:var(--txt2);cursor:pointer;display:inline-flex;align-items:center;opacity:.7;}
  .eye-btn:active{opacity:1;}
  .eye-btn .eye-off{display:none;}
  body.amt-hidden .eye-btn .eye-open{display:none;}
  body.amt-hidden .eye-btn .eye-off{display:inline;}
  /* 隱藏時所有金額以圓點取代（用 CSS 遮蔽，數值仍在 DOM 內不會遺失） */
  body.amt-hidden .nw-val,
  body.amt-hidden .main-card .amt,
  body.amt-hidden .hrow .ha,
  body.amt-hidden .da-type-amt,
  body.amt-hidden .da-li-amt,
  body.amt-hidden .dc-amt{
    color:transparent;position:relative;
  }
  body.amt-hidden .nw-val::after,
  body.amt-hidden .main-card .amt::after,
  body.amt-hidden .hrow .ha::after,
  body.amt-hidden .da-type-amt::after,
  body.amt-hidden .da-li-amt::after,
  body.amt-hidden .dc-amt::after{
    content:'••••••';position:absolute;left:0;right:0;top:0;bottom:0;
    color:var(--txt);letter-spacing:.06em;display:flex;align-items:center;justify-content:flex-end;
  }
  body.amt-hidden .nw-val::after{justify-content:flex-start;letter-spacing:.1em;}

  /* 左側色塊：「重疊書籤」結構 —— 每段都是右上/右下圓角的矩形，
     後一段疊在前一段之上、蓋住前段的下圓角，只有最後一段的下圓角外露。
     這是「唯一」一組色塊：主頁與資產分配比共用，靠變形過渡，不做畫面切換。
     #bar 固定為全螢幕透明容器（不動畫），所有定位交給各色段（phone 座標），
     這樣切換狀態時不會有座標系跳動。
     依截圖擬合：右緣 54.7px、圓角 35.2px、與卡片間隔 20px */
  /* #bar 本身不設 z-index / opacity → 不建立 stacking context，
     讓三個色段能各自用全域 z-index 與黑欄(42)正確交疊：
     cash/invest 在黑欄之下(被切出左上弧形)，debt 在黑欄之上(露出淡藍)。 */
  .bar{position:absolute;inset:0;pointer-events:none;}
  .bar .seg{position:absolute;border-radius:0 35.2px 35.2px 0;pointer-events:auto;cursor:pointer;
    opacity:0;transition:transform 120ms ease-out;}
  .bar .seg:active{transform:scale(0.96);}
  .bar.expanded .seg:active{transform:none;}

  .cards{position:relative;z-index:2;padding-left:55px;pointer-events:none;}

  /* 群組(流動資金/投資) */
  .group{margin-bottom:16px;pointer-events:auto;}
  /* 主卡 */
  .main-card{position:relative;border-radius:24px;background:var(--card-bg);padding:22px 22px;cursor:pointer;overflow:hidden;
    opacity:0;transform:translateY(16px);transition:transform 120ms ease-out, background-color 260ms ease;}
  .main-card:active{transform:scale(0.975);}
  .main-card.open.bank{background:var(--bank);}
  .main-card.open.tw_stock{background:var(--tw_stock);}
  .main-card.open.sub_broker{background:var(--sub_broker);}
  .main-card.open.overseas{background:var(--overseas);}
  .main-card.open.daily{background:var(--daily);}
  .main-card .r1{display:flex;justify-content:space-between;align-items:baseline;transition:color 260ms ease;}
  .main-card .r1 .nm{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .main-card .r1 .amt{font-size:17px;font-weight:800;white-space:nowrap;flex-shrink:0;margin-left:10px;}
  .main-card .r2{display:flex;justify-content:space-between;align-items:center;margin-top:3px;overflow:hidden;max-height:24px;
    transition:opacity 200ms ease, max-height 340ms var(--ease), margin-top 340ms var(--ease);}
  .main-card .sub{font-size:13px;color:var(--txt2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .main-card .date{font-size:12px;color:var(--txt3);flex-shrink:0;margin-left:8px;}
  .main-card .dots{margin-top:8px;font-size:9px;color:var(--txt3);letter-spacing:2px;overflow:hidden;max-height:14px;
    transition:opacity 200ms ease, max-height 340ms var(--ease), margin-top 340ms var(--ease);}
  /* 展開後主卡變色，文字轉深色 */
  .main-card.open .nm,.main-card.open .amt{color:#0a0a0a;}
  .main-card.open .r2,.main-card.open .dots{opacity:0;max-height:0;margin-top:0;overflow:hidden;}

  /* accordion 明細容器：高度動畫 */
  .detail{overflow:hidden;height:0;transition:height 340ms var(--ease);}
  .detail-inner{padding-top:10px;display:flex;flex-direction:column;gap:10px;}
  .hrow{background:var(--card-bg);border-radius:20px;padding:15px 18px;display:flex;align-items:center;gap:14px;
    opacity:0;transform:translateY(8px);transition:opacity 260ms ease-out, transform 260ms ease-out;}
  .hrow .ic{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;border:1.5px solid var(--purple);color:var(--purple);flex-shrink:0;}
  .hrow .ic svg{width:22px;height:22px;display:block;}
  /* 明細列 icon 依所屬群組上色（取代舊 cash/invest 規則） */
  .hrow.bank .ic{border-color:var(--bank);color:var(--bank);}
  .hrow.tw_stock .ic{border-color:var(--tw_stock);color:var(--tw_stock);}
  .hrow.sub_broker .ic{border-color:var(--sub_broker);color:var(--sub_broker);}
  .hrow.overseas .ic{border-color:var(--overseas);color:var(--overseas);}
  .hrow.daily .ic{border-color:var(--daily);color:var(--daily);}
  /* min-width:0 讓 info 可縮到比內容小，名稱/備註超長時以省略號截斷，不再把金額擠出欄位 */
  .hrow .info{flex:1;min-width:0;}
  .hrow .hn{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hrow .hs{font-size:12px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* 金額欄固定不縮、不換行，保證完整顯示在欄位內 */
  .hrow .hr{text-align:right;flex-shrink:0;margin-left:8px;}
  .hrow .ha{font-size:16px;font-weight:700;white-space:nowrap;}
  .hrow.cash .ha{color:var(--green);}
  .hrow.invest .ha{color:var(--purple);}
  .hrow .hd{font-size:11px;color:var(--txt3);margin-top:2px;}

  /* ===== 資產分配比全螢幕 ===== */
  /* 分配比背景層（只負責黑底），色塊由 #bar 擔任 */
  #alloc{position:absolute;inset:0;z-index:40;background:transparent;pointer-events:none;opacity:0;
    transition:opacity 200ms ease;}
  #alloc.on{pointer-events:auto;opacity:1;background:#000;transition:opacity 120ms ease;}
  #alloc.closing{background:transparent;transition:background 160ms ease;}
  body.alloc-closing .a-debtcol{background:transparent;transition:background 160ms ease;}
  .a-head{position:absolute;top:0;left:0;right:0;z-index:46;pointer-events:none;display:flex;align-items:center;justify-content:space-between;
    padding:max(20px, env(safe-area-inset-top, 20px)) 20px 12px;opacity:0;transition:opacity 200ms ease;}
  .a-head.show{opacity:1;pointer-events:auto;}
  .a-head .t{font-size:18px;font-weight:700;}
  .a-head .chev{transition:transform 320ms var(--ease);}
  .a-head .chev.rot{transform:rotate(90deg);}
  /* 資產欄：右上圓角。左上角不圓角——由左側黑欄的「右上圓角」壓在上面切出弧形。
     用 width+left 做展開動畫，不用 scaleX（scaleX 會把圓角水平壓扁）。 */
  /* 左側負債欄：黑底 + 右上角圓角，蓋在資產欄之上，切出資產區左上角的弧形 */
  .a-debtcol{position:absolute;left:0;width:108px;top:0;bottom:0;z-index:42;pointer-events:none;
    background:#000;border-radius:0 34px 0 0;opacity:0;transition:opacity 160ms ease;}
  body.alloc-open .a-debtcol{opacity:1;}
  /* 負債標籤：位於「標籤層」(全螢幕)，故需明確限制寬度在負債欄(108px)內 */
  .a-debtlbl{position:absolute;left:14px;width:86px;opacity:0;transition:opacity 240ms ease;pointer-events:none;
    display:flex;flex-wrap:wrap;align-items:baseline;gap:2px 6px;}
  .a-debtlbl.show{opacity:1;}
  .a-debtlbl .p{font-size:17px;font-weight:800;color:#0a0a0a;}
  .a-debtlbl .sal{font-size:10px;font-weight:600;color:rgba(0,0,0,0.55);white-space:nowrap;}
  .a-debtlbl .l{font-size:14px;font-weight:600;color:rgba(0,0,0,0.72);flex-basis:100%;}
  /* 色塊太矮時的精簡版：百分比+標題同一行，月薪縮小另起一行 */
  .a-debtlbl.compact{gap:0 5px;}
  .a-debtlbl.compact .p{font-size:13px;line-height:1.15;}
  .a-debtlbl.compact .l{font-size:11px;line-height:1.15;flex-basis:auto;}
  .a-debtlbl.compact .sal{font-size:9px;line-height:1.15;flex-basis:100%;}
  /* 標籤層必須高於色段(43)，否則負債色塊會蓋住它的文字 */
  .a-labels{position:absolute;inset:0;z-index:45;pointer-events:none;}
  .a-lbl{position:absolute;left:133px;opacity:0;transition:opacity 240ms ease;}
  .a-lbl.show{opacity:1;}
  .a-lbl .p{font-size:30px;font-weight:800;color:#0a0a0a;line-height:1.05;}
  .a-lbl .l{font-size:14px;font-weight:600;color:rgba(0,0,0,0.7);margin-top:4px;line-height:1.15;word-break:break-word;}
  /* 中色塊：字級縮小 */
  .a-lbl.med .p{font-size:20px;}
  .a-lbl.med .l{font-size:12px;margin-top:2px;}
  /* 最矮色塊：百分比+名稱同一行的精簡版，字級最小 */
  .a-lbl.mini{display:flex;align-items:baseline;flex-wrap:wrap;gap:2px 8px;}
  .a-lbl.mini .p{font-size:14px;line-height:1.1;}
  .a-lbl.mini .l{font-size:12px;line-height:1.1;margin:0;color:rgba(0,0,0,0.72);}

  /* ===== 資產詳情頁(從分配比點色塊進入) =====
     對齊影片：垂直堆疊色塊，高度依佔比(有最小高度保護)，
     色塊內含名稱+百分比，色塊下方顯示金額 */
  /* 詳情頁必須蓋住分配比的所有覆蓋層（色段43 / 黑欄42 / 標籤45 / 標題列46） */
  #adet{position:absolute;inset:0;z-index:50;background:#000;padding:52px 20px 40px;
    opacity:0;pointer-events:none;transform:translateY(12px);
    transition:opacity 260ms ease, transform 260ms var(--ease);overflow-y:auto;}
  #adet.on{opacity:1;pointer-events:auto;transform:translateY(0);}
  .dt-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .dt-head .t{font-size:19px;font-weight:700;}
  .dt-date{font-size:13px;color:var(--txt2);margin-bottom:22px;}
  .dt-bars{display:flex;flex-direction:column;}
  /* 區塊標題 */
  .da-sec-title{font-size:14px;font-weight:700;color:var(--txt2);margin:22px 0 12px;}
  .da-sec-title.first{margin-top:0;}
  /* 類型金額對比：兩條水平比例條（閒置資金 / 股票） */
  .da-type-row{margin-bottom:14px;}
  .da-type-row .r{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:10px;}
  .da-type-nm{font-size:16px;font-weight:700;}
  .da-type-pct{font-size:16px;font-weight:800;}
  .da-type-amt{font-size:12px;color:var(--txt2);margin-left:8px;}
  .da-type-track{height:10px;border-radius:5px;background:rgba(255,255,255,0.08);overflow:hidden;}
  .da-type-track i{display:block;height:100%;border-radius:5px;}
  /* 金額占比密集清單 */
  .da-list{display:flex;flex-direction:column;}
  .da-li{padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .da-li-r{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .da-li-nm{font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .da-li-right{flex-shrink:0;display:flex;align-items:baseline;gap:8px;}
  .da-li-pct{font-size:12px;color:var(--txt2);}
  .da-li-amt{font-size:15px;font-weight:700;}
  .da-li-track{height:4px;border-radius:2px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden;}
  .da-li-track i{display:block;height:100%;border-radius:2px;}
  /* 銀行帳戶占比：比例堆疊色塊（圖二美金匯率頁風格，高度依比例填滿） */
  .da-stack{display:flex;flex-direction:column;border-radius:16px;overflow:hidden;}
  .da-stkseg{position:relative;padding:12px 16px;display:flex;flex-direction:column;justify-content:center;min-height:66px;flex-basis:0;overflow:hidden;}
  .da-stkseg .r{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .da-stkseg .bpct{font-size:20px;font-weight:800;color:#0a0a0a;line-height:1.05;}
  .da-stkseg .bamt{font-size:16px;font-weight:800;color:#0a0a0a;white-space:nowrap;flex-shrink:0;}
  .da-stkseg .bnm{font-size:13px;font-weight:700;color:rgba(0,0,0,0.72);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  body.amt-hidden .da-stkseg .bamt{color:transparent;position:relative;}
  body.amt-hidden .da-stkseg .bamt::after{content:'••••••';position:absolute;left:0;right:0;top:0;bottom:0;color:#0a0a0a;letter-spacing:.06em;display:flex;align-items:center;justify-content:flex-end;}
  /* 股票金額占比：熱力圖 treemap（面積依市值） */
  .da-treemap{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#0a0a0a;}
  .tm-cell{position:absolute;overflow:hidden;box-sizing:border-box;border:1px solid rgba(0,0,0,0.9);}
  .tm-in{height:100%;padding:5px 7px;display:flex;flex-direction:column;justify-content:center;gap:1px;color:#fff;overflow:hidden;}
  .tm-nm{font-size:12px;font-weight:700;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tm-pct{font-size:13px;font-weight:800;line-height:1.15;}
  .tm-amt{font-size:11px;font-weight:700;line-height:1.1;color:rgba(255,255,255,0.92);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  body.amt-hidden .tm-amt{color:transparent;position:relative;}
  body.amt-hidden .tm-amt::after{content:'••••';position:absolute;left:0;top:0;color:rgba(255,255,255,0.92);letter-spacing:.06em;}

  /* ===== 消費明細（日常消費詳情頁：週檢視 + 左右滑換日） ===== */
  /* 點「消費明細」標題即叫出原生日期選單（限當月），選後跳到該日 */
  .dc-title{position:relative;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .dc-title:active{opacity:.7;}
  .dc-cal{color:var(--txt3);flex-shrink:0;}
  .dc-dateinput{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;padding:0;margin:0;cursor:pointer;}
  .dc-dateinput::-webkit-calendar-picker-indicator{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;}
  /* 一週七天橫列 */
  .dc-week{display:flex;gap:6px;margin-bottom:16px;}
  .dc-day{flex:1;min-width:0;background:rgba(255,255,255,0.05);border:none;border-radius:14px;
    padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    color:var(--txt2);transition:background 160ms ease, color 160ms ease;position:relative;}
  .dc-day .wd{font-size:11px;font-weight:600;}
  .dc-day .dn{font-size:15px;font-weight:700;color:var(--txt);}
  .dc-day.disabled{background:transparent;pointer-events:none;visibility:hidden;}
  /* 有消費的日子：底部小圓點提示 */
  .dc-day.has::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;
    background:var(--blue-accent);}
  .dc-day.sel{background:var(--blue-accent);color:#0a0a0a;}
  .dc-day.sel .dn{color:#0a0a0a;}
  .dc-day.sel.has::after{background:rgba(0,0,0,0.45);}
  /* 消費項目卡片 */
  .dc-list{display:flex;flex-direction:column;gap:10px;}
  .dc-item{background:var(--card-bg);border-radius:16px;padding:14px 16px;}
  .dc-r1{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .dc-name{font-size:16px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dc-amt{font-size:16px;font-weight:800;white-space:nowrap;flex-shrink:0;}
  .dc-r2{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:10px;}
  /* 消費類別：醒目彩色標籤 */
  .dc-cat{font-size:12px;font-weight:700;color:#0a0a0a;border-radius:8px;padding:3px 9px;flex-shrink:0;}
  .dc-pay{font-size:12px;color:var(--txt2);}
  /* 回饋類別：次要淡色標籤 */
  .dc-reward{font-size:11px;font-weight:600;color:var(--txt2);background:rgba(255,255,255,0.08);
    border-radius:7px;padding:2px 8px;}
  .dc-empty{font-size:14px;color:var(--txt3);text-align:center;padding:24px 0;}

  /* ===== 幣別占比頁（點淨資產金額進入） =====
     動畫：色塊左滑出、卡片右滑出、本頁自下方滑入；上方淨資產標題/金額不動 */
  #curr{position:absolute;left:0;right:0;bottom:0;z-index:52;background:var(--bg);
    padding:0 20px 0;opacity:0;pointer-events:none;transform:translateY(100%);
    transition:transform 440ms var(--ease), opacity 240ms ease;overflow-y:auto;
    display:flex;flex-direction:column;}
  #curr.on{opacity:1;pointer-events:auto;transform:translateY(0);}
  .curr-rate{flex:none;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--usd);
    padding:8px 2px 18px;}
  .curr-rate .box{background:rgba(70,201,95,0.16);color:var(--usd);border-radius:12px;
    padding:5px 14px;font-size:16px;font-weight:800;letter-spacing:0.3px;}
  /* 色塊區撐滿剩餘高度、填到手機最底部（上圓角、下齊平） */
  .curr-split{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
    border-radius:22px 22px 0 0;overflow:hidden;}
  /* 各色塊用 flex 比例分高（min-height 保護小色塊），自動填滿 .curr-split */
  .curr-seg{position:relative;padding:20px 22px;display:flex;flex-direction:column;justify-content:flex-start;
    flex-basis:0;min-height:96px;}
  .curr-seg.twd{background:var(--twd);}
  .curr-seg.usd-seg{background:var(--usd);}
  .curr-seg .r{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .curr-seg .p{font-size:32px;font-weight:800;color:#0a0a0a;line-height:1.05;}
  .curr-seg .amt{font-size:19px;font-weight:800;color:#0a0a0a;white-space:nowrap;flex-shrink:0;}
  .curr-seg .nm{font-size:15px;font-weight:700;color:rgba(0,0,0,0.72);margin-top:5px;}
  /* 隱藏金額時：幣別頁金額改深色圓點（沿用眼睛切換） */
  body.amt-hidden .curr-seg .amt{color:transparent;position:relative;}
  body.amt-hidden .curr-seg .amt::after{content:'••••••';position:absolute;left:0;right:0;top:0;bottom:0;
    color:#0a0a0a;letter-spacing:.06em;display:flex;align-items:center;justify-content:flex-end;}
  /* 回上一頁按鈕：佔右上角(與＋同位置)，僅幣別頁顯示 */
  .curr-back{position:absolute;right:0;top:-4px;width:52px;height:52px;border-radius:50%;
    background:rgba(255,255,255,0.12);border:none;color:#fff;display:flex;align-items:center;justify-content:center;
    cursor:pointer;opacity:0;pointer-events:none;transform:scale(0.8);
    transition:opacity 200ms ease, transform 200ms ease;}
  .curr-back:active{transform:scale(0.9);}
  body.curr-open .curr-back{opacity:1;pointer-events:auto;transform:scale(1);}
  body.curr-open .add{opacity:0 !important;pointer-events:none;}

  /* ===== 新增帳戶頁 ===== */
  #addpage{position:absolute;inset:0;z-index:48;background:#141416;padding:52px 20px 40px;
    transform:translateX(100%);transition:transform 340ms var(--ease);overflow-y:auto;}
  #addpage.on{transform:translateX(0);}
  .ap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
  .ap-head .t{font-size:19px;font-weight:700;}
  .ap-list{display:flex;flex-direction:column;gap:11px;}
  .ap-cat{border-radius:22px;padding:18px 22px;font-size:17px;font-weight:700;color:#0a0a0a;cursor:pointer;
    transition:transform 120ms ease-out;}
  .ap-cat:active{transform:scale(0.98);}
  .ap-sub{overflow:hidden;height:0;transition:height 320ms var(--ease);}
  .ap-sub-inner{display:flex;flex-direction:column;gap:9px;padding:9px 0 0 32px;}
  .ap-item{background:#000;border-radius:18px;padding:15px 18px;display:flex;align-items:center;gap:14px;
    font-size:16px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(8px);
    transition:opacity 260ms ease-out, transform 260ms ease-out;}
  .ap-item .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}

  /* ===== 趨勢頁 ===== */
  /* 趨勢頁需蓋住主頁色塊(41~43) */
  #trend{position:absolute;inset:0;padding:56px 20px 100px;z-index:47;background:var(--bg);opacity:0;pointer-events:none;
    transition:opacity 240ms ease, transform 240ms ease;transform:translateY(8px);}
  #trend.on{opacity:1;pointer-events:auto;transform:translateY(0);}
  .t-title{font-size:22px;font-weight:800;margin-bottom:18px;}
  .pills{position:relative;display:flex;background:var(--card-bg);border-radius:999px;padding:4px;margin-bottom:22px;}
  .pind{position:absolute;top:4px;left:4px;height:calc(100% - 8px);width:calc(50% - 4px);background:rgba(255,255,255,0.16);border-radius:999px;transition:transform 300ms var(--ease);}
  .pill{flex:1;z-index:1;text-align:center;padding:10px 6px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;border:none;background:none;}
  .pill.on{color:#fff;}
  .lg{display:flex;gap:18px;margin-bottom:12px;font-size:13px;}
  .lg span{display:flex;align-items:center;gap:6px;color:var(--txt2);}
  .lg i{width:10px;height:10px;border-radius:3px;}
  .t-sum{font-size:14px;line-height:1.7;color:var(--txt2);margin-bottom:16px;min-height:70px;}
  .t-sum b{color:#fff;}
  .cw{position:relative;height:220px;}
  .cw svg{width:100%;height:100%;}
  .cp{transition:opacity 220ms ease;}

  /* ===== 底部選單 ===== */
  .ov{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:60;opacity:0;pointer-events:none;transition:opacity 240ms ease;}
  .ov.show{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:61;background:var(--sheet);border-radius:26px 26px 0 0;padding:10px 8px 30px;
    transform:translateY(100%);transition:transform 320ms var(--ease);}
  .sheet.show{transform:translateY(0);}
  .si{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:16px;font-size:16px;cursor:pointer;}
  .si:active{background:rgba(255,255,255,0.06);}
  .si svg{opacity:0.85;}
  .sd{height:1px;background:rgba(255,255,255,0.08);margin:6px 14px;}

  /* ===== 設定頁 ===== */
  #settings{position:absolute;inset:0;padding:56px 20px 100px;z-index:51;background:var(--bg);transform:translateX(100%);transition:transform 340ms var(--ease);}
  #settings.show{transform:translateX(0);}
  .sh{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .sh .t{font-size:20px;font-weight:700;}
  .cfg{background:var(--card-bg);border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .cfg .n{font-size:15px;font-weight:600;}
  .cfg .m{font-size:12px;color:var(--txt2);margin-top:3px;}
  .cfg .tb{background:rgba(139,147,240,0.15);color:var(--blue-accent);border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:600;}
  .cadd{margin-top:8px;width:100%;padding:14px;border-radius:16px;border:1.5px dashed rgba(255,255,255,0.2);background:none;color:var(--txt2);font-size:14px;cursor:pointer;}

  /* ===== 底部導覽 ===== */
  /* bottom 吃 safe-area：手機有 home indicator 時上抬，避免被切；桌機(inset=0)維持 33px */
  .nav{position:absolute;left:33px;right:auto;width:210px;height:53px;bottom:max(33px, calc(env(safe-area-inset-bottom, 0px) + 16px));z-index:49;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.14), 0 8px 24px rgba(0,0,0,0.28);
    border-radius:999px;padding:0 24px;display:flex;justify-content:space-between;align-items:center;
    transition:opacity 200ms ease;}
  /* 導覽列需在趨勢頁(47)之上、詳情頁(50)之下 */
  /* 資產分配比展開時，導覽列(z=49)會浮在色塊(41~43)之上 —— 用 opacity+pointer-events 淡出，
     不動 z-index 層級表、不用 display(避免跳動)。淡出 200ms < 色塊展開 460ms，
     且 body.alloc-open 在 openAlloc 起始同步加上，故導覽列在色塊動畫早期即消失，不會中途閃現。 */
  body.alloc-open .nav{opacity:0;pointer-events:none;}
  .nb{background:none;border:none;color:var(--txt2);cursor:pointer;padding:2px;display:flex;transition:color 200ms ease;}
  .nb.on{color:#fff;}

  /* ===== 載入 / 錯誤層（串接 Google Sheet 後新增，與既有動畫無關） ===== */
  .boot{position:absolute;inset:0;z-index:80;background:var(--bg);display:flex;align-items:center;justify-content:center;
    transition:opacity 320ms ease;}
  .boot.hide{opacity:0;pointer-events:none;}
  .boot-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:0 40px;text-align:center;}
  .boot-spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--blue-accent);
    animation:bootspin 0.8s linear infinite;}
  @keyframes bootspin{to{transform:rotate(360deg);}}
  .boot-msg{font-size:14px;color:var(--txt2);line-height:1.6;}
  .boot-retry{background:var(--blue-accent);color:#111;border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;}

  /* ===== 密碼鎖（純前端隱私鎖） ===== */
  .gate{position:absolute;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;}
  .gate.hide{display:none;}
  .gate-box{display:flex;flex-direction:column;gap:14px;width:80%;max-width:300px;}
  .gate-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px;}
  .gate-input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;
    padding:14px 16px;color:var(--txt);font-size:16px;text-align:center;}
  .gate-input:focus{outline:none;border-color:var(--blue-accent);}
  .gate-btn{background:var(--blue-accent);color:#111;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;}
  .gate-btn:active{transform:scale(0.98);}
  .gate-err{color:#ff6b6b;font-size:13px;text-align:center;min-height:16px;}

  /* ===== 設定頁 — 動態欄位對應編輯（新增） ===== */
  #settings{overflow-y:auto;}
  .set-status{font-size:13px;margin-bottom:12px;min-height:18px;color:var(--txt2);line-height:1.5;}
  .set-status.ok{color:var(--green);}
  .set-status.err{color:#ff6b6b;}
  .cfg-row{background:var(--card-bg);border-radius:18px;padding:14px 16px;margin-bottom:10px;}
  .cfg-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cfg-fields label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--txt3);min-width:0;}
  .cfg-fields input,.cfg-fields select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;
    padding:8px 10px;color:var(--txt);font-size:14px;width:100%;max-width:100%;}
  .cfg-fields select{appearance:none;-webkit-appearance:none;cursor:pointer;}
  .cfg-fields option{background:var(--card-bg);color:var(--txt);}
  .cfg-fields input:focus,.cfg-fields select:focus{outline:none;border-color:var(--blue-accent);}
  .cfg-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .cfg-test{background:rgba(139,147,240,0.15);color:var(--blue-accent);border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
  .cfg-del{background:rgba(255,107,107,0.12);color:#ff6b6b;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
  .cfg-result{font-size:12px;color:var(--txt2);margin-left:auto;text-align:right;max-width:48%;word-break:break-all;}
  .cfg-result.err{color:#ff6b6b;}
  .csave{margin-top:6px;margin-bottom:40px;width:100%;padding:14px;border-radius:16px;border:none;background:var(--blue-accent);color:#111;font-size:15px;font-weight:700;cursor:pointer;}
  .csave:disabled{opacity:0.5;}
</style>
</head>
<body>
<div id="phone">

  <!-- 密碼鎖（純前端隱私鎖，非真正安全防護）：第一次需輸入，之後記住 -->
  <div id="gate" class="gate">
    <div class="gate-box">
      <div class="gate-title">我的記帳</div>
      <input id="gatePw" class="gate-input" type="password" inputmode="text" placeholder="請輸入密碼" autocomplete="off">
      <button id="gateBtn" class="gate-btn">進入</button>
      <div id="gateErr" class="gate-err"></div>
    </div>
  </div>

  <!-- 載入 / 錯誤層（串接 Google Sheet 後新增） -->
  <div id="boot" class="boot">
    <div class="boot-box">
      <div class="boot-spin" id="bootSpin"></div>
      <div class="boot-msg" id="bootMsg">載入中…</div>
      <button class="boot-retry" id="bootRetry" style="display:none">重試</button>
      <button class="boot-retry" id="bootDemo" style="display:none;background:rgba(255,255,255,0.12);color:#fff">以範例資料進入</button>
    </div>
  </div>

  <!-- 首頁 -->
  <div id="home">
    <div class="head">
      <div class="nw-lbl" id="nwLbl">我的淨資產 <span>(TWD)</span>
        <button class="eye-btn" id="eyeBtn" aria-label="顯示或隱藏金額">
          <svg class="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button class="curr-back" id="currBack" aria-label="回上一頁"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    </div>
    <div class="nw-val" id="nwVal">0</div>

    <div class="stack">
      <div class="cards" id="cards"></div>
    </div>
  </div>

  <!-- 唯一一組色塊：主頁與資產分配比共用同一批 DOM，靠變形在兩個狀態間過渡。
       提升到 #phone 層級，才能自由動畫到分配比的位置。 -->
  <div class="bar" id="bar"></div>

  <!-- 資產分配比：只保留全螢幕黑底（色塊由上方唯一那組 #bar 擔任） -->
  <div id="alloc"></div>

  <!-- 分配比的覆蓋層：黑欄(切出資產區左上弧形) / 標籤 / 標題列。
       必須在 #bar 之上，故提升到 #phone 層級。 -->
  <div class="a-debtcol" id="aDebtCol"></div>
  <div class="a-labels" id="aLabels"></div>
  <div class="a-head" id="aHead">
    <div class="t">資產分配比</div>
    <button class="ib chev" id="aChev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>

  <!-- 幣別占比頁（點淨資產金額進入）：即時美金匯率 + 台幣/美金比例色塊 -->
  <div id="curr">
    <div class="curr-rate" id="currRate"></div>
    <div class="curr-split" id="currSplit"></div>
  </div>

  <!-- 資產詳情頁(從分配比點色塊進入) -->
  <div id="adet">
    <div class="dt-head">
      <button class="ib" id="adBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="t" id="adTitle">流動資金</div>
    </div>
    <div class="dt-date" id="adDate">2026 年 7 月</div>
    <div class="dt-bars" id="adBars"></div>
  </div>

  <!-- 新增帳戶頁(首頁右上加號進入) -->
  <div id="addpage">
    <div class="ap-head">
      <button class="ib" id="apBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="t">新增帳戶</div>
      <div style="width:38px"></div>
    </div>
    <div class="ap-list" id="apList"></div>
  </div>

  <!-- 趨勢頁 -->
  <div id="trend">
    <div class="t-title">趨勢圖</div>
    <div class="pills">
      <div class="pind" id="pind"></div>
      <button class="pill on" data-tab="0">淨資產與負債</button>
      <button class="pill" data-tab="1">流動資金與投資</button>
    </div>
    <div class="lg"><span><i style="background:var(--green)"></i>流動資金</span><span><i style="background:var(--purple)"></i>投資</span></div>
    <div class="t-sum" id="tSum"></div>
    <div class="cw">
      <svg viewBox="0 0 400 200" preserveAspectRatio="none">
        <line x1="0" y1="180" x2="400" y2="180" stroke="rgba(255,255,255,0.1)"/><line x1="0" y1="135" x2="400" y2="135" stroke="rgba(255,255,255,0.1)"/><line x1="0" y1="90" x2="400" y2="90" stroke="rgba(255,255,255,0.1)"/><line x1="0" y1="45" x2="400" y2="45" stroke="rgba(255,255,255,0.1)"/>
        <path class="cp" id="pG" d="M0,178 L100,178 L200,178 L300,176 L400,175" fill="none" stroke="var(--green)" stroke-width="3"/>
        <path class="cp" id="pP" d="M0,178 L100,178 L200,178 L300,140 L400,20" fill="none" stroke="var(--purple)" stroke-width="3"/>
      </svg>
    </div>
  </div>

  <!-- 設定頁 -->
  <div id="settings">
    <div class="sh">
      <button class="ib" id="setBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="t">設定 — 欄位對應</div>
    </div>
    <div class="set-status" id="setStatus"></div>
    <div id="cfgList"></div>
    <button class="cadd" id="cfgAdd">＋ 新增欄位對應</button>
    <button class="csave" id="cfgSave">儲存到 Google Sheet</button>
  </div>

  <!-- 底部選單 -->
  <div class="ov" id="ov"></div>

<script>
/* ===== 資料來源：Google Sheet（Apps Script Web App） =====
   原本寫死的 const data / monthlySalary 已移除，改由 getDashboard 取回。
   取回結構與原本完全相同：data[k]={key,title,total,sub,rows:[{ic,name,sub,amt,date}]} */
const API_URL='https://script.google.com/macros/s/AKfycbw8zV-mVc2VVMf6E_npwu2qey8wEAeiJ7Xk23vmt040XU9PFK6U4RYXCCjej71oDL1ccw/exec';
const CACHE_KEY='dashboardCache_v2';   // v2：快取新增 usdRate 欄位

let data=null;             // 由 API 載入後填入（相容時）；否則用 FALLBACK_DATA
let monthlySalary=60000;   // 由 API 載入後覆寫（後備值 60000）
let usdRate=32;            // 即時美金匯率（Config!K3）；由 API 覆寫，後備值 32
const FALLBACK_USD_RATE=32;
// 幣別占比頁用：依 Config，群組幣別固定 —— 台幣資產 / 美金資產（後端已把美金換算成台幣存進 total）
const TWD_ASSET_KEYS=['bank','tw_stock'];

// 六個項目：五個資產 + 一個負債（日常消費，完全沿用原負債行為）。
// 鍵值固定，與資料值無關。放進 debtKeys 的 daily 自動繼承：左欄顯示、分母為月薪、不計入淨資產。
const assetKeys=['bank','tw_stock','sub_broker','overseas'];
const debtKeys=['daily'];
const order=[...assetKeys,...debtKeys];

// 本機假資料 / 後備資料（介面先行）。之後串 Google Sheet，boot() 判定 API 結構相容時會覆蓋。
// overseas 佔比很高、其餘資產偏小 —— 刻意用來驗證 MIN_SEG(29px) 最小高度保護與矮色塊精簡標籤。
const FALLBACK_MONTHLY_SALARY=60000;
// D 改分組後：閒置資金取消，三項併入對應群組並置頂（rows[0]）。ic 欄不再使用（明細改用群組 SVG）
const FALLBACK_DATA={
  bank:{key:'bank',title:'銀行帳戶',total:248668,sub:'兆豐、將來、台新',rows:[
    {ic:'',name:'兆豐銀行',sub:'',amt:145165,date:'7月9日'},
    {ic:'',name:'將來銀行',sub:'',amt:10050,date:'7月9日'},
    {ic:'',name:'台新銀行',sub:'',amt:93453,date:'7月9日'} ]},
  tw_stock:{key:'tw_stock',title:'台股',total:1629117,sub:'國泰cube (台幣)、元大高股息',rows:[
    {ic:'',name:'國泰cube (台幣)',sub:'',amt:568617,date:'7月9日'},
    {ic:'',name:'元大高股息',sub:'台股 · 持有 10000, $106.05',amt:1060500,date:'7月9日'} ]},
  sub_broker:{key:'sub_broker',title:'複委託',total:1168059,sub:'國泰cube (外幣)、VOO',rows:[
    {ic:'',name:'國泰cube (外幣)',sub:'',amt:18105,date:'7月9日'},
    {ic:'',name:'VOO',sub:'美股 · 國泰複委託 · 持有 200, $580.00',amt:1149954,date:'7月9日'} ]},
  overseas:{key:'overseas',title:'海外券商',total:9519587,sub:'Firstrade、META',rows:[
    {ic:'',name:'Firstrade',sub:'',amt:19587,date:'7月9日'},
    {ic:'',name:'META',sub:'美股 · Firstrade · 持有 554, $606.96',amt:9500000,date:'7月9日'} ]},
  daily:{key:'daily',title:'日常消費',total:24000,sub:'信用卡費',rows:[
    {ic:'',name:'國泰 CUBE 卡',sub:'信用卡費',amt:18000,date:'7月9日'},
    {ic:'',name:'兆豐信用卡',sub:'信用卡費',amt:6000,date:'7月9日'} ]}
};

// 以下原本是頂層一次性 const；因資料改為非同步載入，改為 let，
// 由 computeDerived() 在資料到位後計算。其餘動畫/佈局程式碼讀取這些變數的方式不變。
let netWorth=0;
let assetTotal=0;
let allSegs=[];
let fineSegs=[];
const fmt=n=>n.toLocaleString('en-US');
const money=n=>fmt(n);   // 金額不加前綴（取消 NT$，省空間）

// 依 data 重新計算衍生值。allSegs / fineSegs 改由 assetKeys 動態生成，
// 自動適應資產項目數量（原本寫死兩段，現在五段），符合「改資料就自動適應」的設計。
function computeDerived(){
  // 淨資產只加總資產（assetKeys），不含負債（debtKeys）
  netWorth=assetKeys.reduce((s,k)=>s+data[k].total,0);
  assetTotal=netWorth;
  allSegs=assetKeys.map(k=>({key:k,name:data[k].title,amt:data[k].total,color:GROUP_COLOR[k]}));
  fineSegs=assetKeys.flatMap(k=>data[k].rows.map(r=>({name:r.name,amt:r.amt,color:GROUP_COLOR[k]})));
}

// 統一的 API 呼叫（全 GET，避免 CORS）。加逾時：Apps Script 偶有冷啟動很慢，
// 沒有逾時會讓載入無限卡在「載入中…」（看起來像進不去）。
function api(params, timeoutMs=30000){
  const qs=new URLSearchParams(params).toString();
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(), timeoutMs);
  return fetch(API_URL+'?'+qs, {signal:ctrl.signal})
    .then(r=>r.json())
    .finally(()=>clearTimeout(timer));
}

const phone=document.getElementById('phone');

/* ===== 建卡片 ===== */
const cardsEl=document.getElementById('cards');
function buildCards(){
  openKey=null;
  cardsEl.innerHTML='';
  order.forEach(k=>{
    const d=data[k];
    const g=document.createElement('div');
    g.className='group';
    g.innerHTML=`
      <div class="main-card ${k}" data-key="${k}">
        <div class="r1"><span class="nm">${d.title}</span><span class="amt">${money(d.total)}</span></div>
        <div class="r2"><span class="sub">${d.sub}</span></div>
      </div>
      <div class="detail" data-key="${k}"><div class="detail-inner"></div></div>`;
    cardsEl.appendChild(g);
  });
  // 卡片是資料載入後才建立，點擊綁定改在這裡（原本在下方 querySelectorAll('.main-card')）
  document.querySelectorAll('.main-card').forEach(card=>{
    card.addEventListener('click',()=>toggleCard(card.dataset.key));
  });
}

/* ===== count up ===== */
function countUp(el,target,dur=800){const s=performance.now();
  (function t(now){const p=Math.min((now-s)/dur,1);el.textContent=fmt(Math.floor((1-Math.pow(1-p,4))*target));if(p<1)requestAnimationFrame(t);})(performance.now());}

/* ===== 左側色塊 =====
   關鍵：色塊高度 = 對應群組(主卡+展開明細)的實際高度，
   哪個群組展開，色塊就跟著長高。不是金額比例。 */
const GROUP_COLOR={bank:'var(--bank)',tw_stock:'var(--tw_stock)',sub_broker:'var(--sub_broker)',overseas:'var(--overseas)',daily:'var(--daily)'};
/* 群組 SVG 線稿 icon（取代 emoji）：明細列統一用所屬群組的 icon。stroke/fill 用 currentColor，顏色由 .ic 決定 */
const _svgBank='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-5 9 5"/><path d="M4 9.5v8.5M20 9.5v8.5M8.5 9.5v8.5M15.5 9.5v8.5M12 9.5v8.5"/><path d="M2.5 18.5h19"/></svg>';
const _svgCard='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2.5"/><path d="M3 10h18"/><path d="M6.5 14.5h4"/></svg>';
const _svgLetters=t=>'<svg viewBox="0 0 24 24" fill="none"><text x="12" y="12" text-anchor="middle" dominant-baseline="central" font-size="9.5" font-weight="800" fill="currentColor" font-family="-apple-system,BlinkMacSystemFont,sans-serif">'+t+'</text></svg>';
const GROUP_SVG={bank:_svgBank, tw_stock:_svgLetters('TW'), sub_broker:_svgLetters('TW'), overseas:_svgLetters('US'), daily:_svgCard};
const BAR_LEFT=-10, BAR_W=64.7;   // 主頁色塊：左緣(超出畫面)與寬度 → 右緣 54.7px
let barBuilt=false;
let barExpanded=false;            // 展開到資產分配比時，layoutBar 不覆寫色段
function layoutBar(){
  const bar=document.getElementById('bar');
  const groups=[...document.querySelectorAll('.group')];
  if(!groups.length) return;
  if(!barBuilt){
    order.forEach(k=>{
      const d=document.createElement('div');
      d.className='seg'; d.dataset.key=k;
      d.style.background=GROUP_COLOR[k];
      d.addEventListener('click',()=>{
        if(barExpanded) openAssetDetail(k);   // 分配比中：點色塊 → 該資產詳情
        else openAlloc();                     // 主頁：點色塊 → 資產分配比
      });
      bar.appendChild(d);
    });
    barBuilt=true;
  }
  if(barExpanded || currOpen) return;   // 分配比展開或幣別頁開啟時，別覆寫色段（幣別頁用 transform 把 #bar 整體滑出）

  // 主頁佈局（phone 座標）：色段對齊各群組，重疊書籤式堆疊
  const pr=phone.getBoundingClientRect();
  const firstTop=groups[0].getBoundingClientRect().top;
  const lastRect=groups[groups.length-1].getBoundingClientRect();
  const totalBottom=lastRect.bottom-pr.top;

  groups.forEach((g,i)=>{
    const key=g.querySelector('.main-card').dataset.key;
    const seg=bar.querySelector(`.seg[data-key="${key}"]`);
    if(!seg) return;
    const r=g.getBoundingClientRect();
    const top=r.top-pr.top;
    // 關鍵：清除 animateBarTo() 殘留的 left/top/width/height 過場動畫。
    // 否則主頁展開卡片時，色塊的幾何更新會被那 400ms 的 transition 平滑化，
    // 導致色塊嚴重落後卡片（開過一次資產分配比之後才會發生）。
    seg.style.transition='opacity 350ms ease-out, transform 120ms ease-out';
    seg.style.left=BAR_LEFT+'px';
    seg.style.top=top+'px';
    seg.style.width=BAR_W+'px';
    seg.style.height=Math.max(0,totalBottom-top)+'px';   // 延伸到底 → 後段蓋前段下圓角
    seg.style.zIndex=String(41+i);                        // 41,42,43：後段蓋前段
    seg.style.borderRadius='0 35.2px 35.2px 0';
  });
}
// 供分配比動畫使用：取得主頁佈局下各色段的目標矩形
function homeBarRects(){
  const groups=[...document.querySelectorAll('.group')];
  const pr=phone.getBoundingClientRect();
  const lastRect=groups[groups.length-1].getBoundingClientRect();
  const totalBottom=lastRect.bottom-pr.top;
  const out={};
  groups.forEach((g,i)=>{
    const key=g.querySelector('.main-card').dataset.key;
    const r=g.getBoundingClientRect();
    const top=r.top-pr.top;
    out[key]={left:BAR_LEFT, top, width:BAR_W, height:Math.max(0,totalBottom-top), z:41+i,
              radius:'0 35.2px 35.2px 0'};
  });
  return out;
}

/* ===== 首頁進場 ===== */
function intro(){
  layoutBar();
  const seq=[document.getElementById('nwLbl'),document.getElementById('nwVal'),...document.querySelectorAll('.main-card')];
  seq.forEach((el,i)=>setTimeout(()=>{el.style.transition='opacity 350ms ease-out, transform 350ms ease-out';el.style.opacity=1;
    if(el.classList.contains('add'))el.style.transform='scale(1)';else el.style.transform='translateY(0)';},i*70));
  // 色段各自淡入（#bar 本身不設 opacity，否則會建立 stacking context 破壞層級）
  setTimeout(()=>{
    document.querySelectorAll('#bar .seg').forEach(s=>{
      s.style.transition='opacity 350ms ease-out, transform 120ms ease-out';
      s.style.opacity=1;
    });
  },210);
  countUp(document.getElementById('nwVal'),netWorth,800);
}
/* ===== 資料載入 / 快取 / 載入狀態 ===== */
// 取 dashboard：force=true 時跳過 sessionStorage 快取，直接重打 API
function loadDashboard(force){
  if(!force){
    try{
      const cached=sessionStorage.getItem(CACHE_KEY);
      if(cached){
        const obj=JSON.parse(cached);
        if(obj&&obj.data) return Promise.resolve(obj);
      }
    }catch(e){}
  }
  return api({action:'getDashboard'}).then(res=>{
    if(!res||res.ok===false) throw new Error((res&&res.error)||'getDashboard 失敗');
    if(!res.data) throw new Error('回傳格式不正確（缺少 data）');
    const payload={monthlySalary:res.monthlySalary,usdRate:res.usdRate,data:res.data};
    try{sessionStorage.setItem(CACHE_KEY,JSON.stringify(payload));}catch(e){}
    return payload;
  });
}

// 進入點：抓資料 → 計算衍生值 → 建卡片 → 進場動畫；失敗顯示錯誤與重試
// 用本機範例資料進入 App（API 慢/失敗時的逃生路徑，確保一定進得去）
function enterFallback(){
  data=FALLBACK_DATA;
  monthlySalary=FALLBACK_MONTHLY_SALARY;
  usdRate=FALLBACK_USD_RATE;
  computeDerived();
  buildCards();
  renderTrendSum();
  document.getElementById('boot').classList.add('hide');
  intro();
}

function boot(force){
  const bootEl=document.getElementById('boot');
  const bootSpin=document.getElementById('bootSpin');
  const bootMsg=document.getElementById('bootMsg');
  const bootRetry=document.getElementById('bootRetry');
  const bootDemo=document.getElementById('bootDemo');
  bootEl.classList.remove('hide');
  bootSpin.style.display='';
  bootRetry.style.display='none';
  bootDemo.style.display='none';
  bootMsg.style.whiteSpace='pre-line';
  bootMsg.textContent='載入中…';
  // 載入超過 8 秒仍未完成 → 提示伺服器較慢，並露出「以範例資料進入」逃生（背景仍繼續載入）
  let slowTimer=setTimeout(()=>{
    bootMsg.textContent='載入中…\n（伺服器回應較慢，可再等一下，或先以範例資料進入）';
    bootDemo.style.display='';
  }, 8000);

  loadDashboard(force).then(payload=>{
    clearTimeout(slowTimer);
    const pd=payload&&payload.data;
    // 相容性檢查：API 是否已提供目前前端定義的五個項目（bank/tw_stock/sub_broker/overseas/daily）。
    // 目前後端仍回舊的 cash/invest/debt → 不相容 → 用本機假資料（介面先行）。
    const compatible=pd&&order.every(k=>pd[k]&&typeof pd[k].total!=='undefined'&&Array.isArray(pd[k].rows));
    if(compatible){
      data=pd;
      monthlySalary=(payload.monthlySalary!=null)?Number(payload.monthlySalary):FALLBACK_MONTHLY_SALARY;
      usdRate=(payload.usdRate!=null)?Number(payload.usdRate):FALLBACK_USD_RATE;
    }else{
      data=FALLBACK_DATA;
      monthlySalary=FALLBACK_MONTHLY_SALARY;
      usdRate=FALLBACK_USD_RATE;
    }
    if(!isFinite(monthlySalary)||monthlySalary<=0) monthlySalary=FALLBACK_MONTHLY_SALARY;
    if(!isFinite(usdRate)||usdRate<=0) usdRate=FALLBACK_USD_RATE;
    computeDerived();
    buildCards();
    renderTrendSum();
    bootEl.classList.add('hide');
    intro();
  }).catch(err=>{
    clearTimeout(slowTimer);
    bootSpin.style.display='none';
    const isAbort=err&&(err.name==='AbortError');
    bootMsg.textContent=(isAbort?'載入逾時（伺服器太久沒回應）':'載入失敗：'+((err&&err.message)||err))
      +'\n可重試，或先以範例資料進入。';
    bootRetry.style.display='';
    bootDemo.style.display='';
  });
}
document.getElementById('bootRetry').addEventListener('click',()=>boot(true));
document.getElementById('bootDemo').addEventListener('click',enterFallback);
/* ===== 進入點：密碼鎖 + 預設隱藏金額（隱私） ===== */
const AUTH_KEY='fd_authed', PASSCODE='micronic';
function startApp(){
  document.body.classList.add('amt-hidden');   // 每次開啟預設隱藏金額（點眼睛可顯示）
  const gate=document.getElementById('gate');
  if(localStorage.getItem(AUTH_KEY)==='1'){ gate.classList.add('hide'); boot(false); return; }
  const pw=document.getElementById('gatePw'), btn=document.getElementById('gateBtn'), err=document.getElementById('gateErr');
  function tryAuth(){
    if(pw.value===PASSCODE){
      try{localStorage.setItem(AUTH_KEY,'1');}catch(e){}
      gate.classList.add('hide'); boot(false);
    } else { err.textContent='密碼錯誤'; pw.value=''; pw.focus(); }
  }
  btn.addEventListener('click',tryAuth);
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); tryAuth(); } });
  setTimeout(()=>pw.focus(),120);
}
window.addEventListener('load',startApp);
window.addEventListener('resize',layoutBar);

/* 色塊已提升到 #phone 層級，不會跟著 #home 滾動。
   手機螢幕較短、卡片展開後 #home 會出現捲軸，此時必須即時重算色塊位置，
   否則色塊會與卡片脫節（桌面高度足夠不會觸發，故只在小螢幕才看得出來）。 */
let scrollTick=false;
document.getElementById('home').addEventListener('scroll',()=>{
  if(barExpanded || currOpen || scrollTick) return;
  scrollTick=true;
  requestAnimationFrame(()=>{ layoutBar(); scrollTick=false; });
},{passive:true});

/* =========================================================
   卡片 inline 展開：卡片變色 + 下方 accordion 露出持股列
   首頁其他元素完全不動
   ========================================================= */
let openKey=null;
// 卡片點擊綁定已移至 buildCards()（卡片改為資料載入後才建立）

function fillDetail(k){
  const d=data[k];
  const det=document.querySelector(`.detail[data-key="${k}"]`);
  const inner=det.querySelector('.detail-inner');
  inner.innerHTML='';
  d.rows.forEach(r=>{
    const row=document.createElement('div');
    row.className='hrow '+k;
    row.innerHTML=`<div class="ic">${GROUP_SVG[k]||''}</div><div class="info"><div class="hn">${r.name}</div><div class="hs">${r.sub}</div></div><div class="hr"><div class="ha">${money(r.amt)}</div></div>`;
    inner.appendChild(row);
  });
  return {det,inner};
}

function openCard(k){
  const card=document.querySelector(`.main-card[data-key="${k}"]`);
  const {det,inner}=fillDetail(k);
  card.classList.add('open');
  // 高度動畫：0 -> 內容實際高度
  det.style.height=inner.offsetHeight+'px';
  // 持股列 stagger 浮現
  requestAnimationFrame(()=>{
    inner.querySelectorAll('.hrow').forEach((row,i)=>{
      setTimeout(()=>{row.style.opacity=1;row.style.transform='translateY(0)';},80+i*50);
    });
  });
  layoutBarAfter();
  openKey=k;
}
function closeCard(k){
  const card=document.querySelector(`.main-card[data-key="${k}"]`);
  const det=document.querySelector(`.detail[data-key="${k}"]`);
  const inner=det.querySelector('.detail-inner');
  card.classList.remove('open');
  inner.querySelectorAll('.hrow').forEach(row=>{row.style.opacity=0;row.style.transform='translateY(8px)';});
  det.style.height='0px';
  layoutBarAfter();   // 立即開始逐幀同步（與展開一致），避免收合末端才跳動
  openKey=null;
}
function toggleCard(k){
  if(openKey===k){ closeCard(k); }
  else { if(openKey)closeCard(openKey); openCard(k); }
}
// accordion 展開/收合期間，持續用 rAF 同步色塊高度，讓色塊與卡片完全同步長高
// 逐幀同步色塊與卡片高度。重複呼叫只延長追蹤期限，不會疊加多個迴圈。
let barSyncUntil=0, barSyncRunning=false;
function layoutBarAfter(dur=460){
  barSyncUntil=performance.now()+dur;
  if(barSyncRunning) return;
  barSyncRunning=true;
  requestAnimationFrame(function tick(now){
    layoutBar();
    if(now<barSyncUntil) requestAnimationFrame(tick);
    else barSyncRunning=false;
  });
}

/* =========================================================
   資產分配比：左側色塊橫向拉開(scaleX)
   ========================================================= */
const allocEl=document.getElementById('alloc');
const aDebtCol=document.getElementById('aDebtCol');
const DEBT_COL_W=108;    // 左側負債欄寬度（黑底，右上圓角）
const ASSET_LEFT=74;     // 資產欄左緣：比黑欄窄，讓黑欄右上圓角(34px)切出弧形左上角
const aLabels=document.getElementById('aLabels');
const aHead=document.getElementById('aHead');
const aChev=document.getElementById('aChev');
const barEl=document.getElementById('bar');
let aFine=false;
const A_MS=460;
const A_CLOSE_MS=400;   // 收合略短，配合對稱緩動，收回更俐落不拖尾

const A_TOP=78;                        // 標題列高度，色塊從此處開始（v1.07 再縮小留白 108→78）
function H(){ return phone.getBoundingClientRect().height; }
function areaH(){ return H()-A_TOP; }   // 色塊可用高度：標題列下方到畫面最底
const MIN_SEG=29;   // 最小色塊高度(px)，對齊影片：0.79%的綠色仍佔約29px
// 依比例配高，但每塊至少 MIN_SEG；不足的部分從最大的區塊扣回
function allocHeights(segs, ah){
  let hs=segs.map(s=>(s.amt/netWorth)*ah);
  let debt=0;
  hs=hs.map(h=>{ if(h<MIN_SEG){ debt+=MIN_SEG-h; return MIN_SEG; } return h; });
  if(debt>0){
    const bi=hs.indexOf(Math.max(...hs));
    hs[bi]=Math.max(MIN_SEG, hs[bi]-debt);
  }
  return hs;
}
const DEBT_MIN_H=48;   // 負債色塊最小高度(px)，讓 0% 也看得見
/* 計算「資產分配比」狀態下，三個色段各自的目標矩形（phone 座標）。
   cash/invest 在右側資產欄；debt 在左側負債欄、貼底。
   不再另建一組色塊 —— 由主頁那三段直接變形過去。 */
function allocBarRects(){
  const pr=phone.getBoundingClientRect();
  const ah=areaH();
  const assetLeft=ASSET_LEFT, assetW=pr.width-ASSET_LEFT;
  const out={};

  // 資產段：依金額比例配高（含最小高度保護），從標題列下方往下堆疊
  const hs=allocHeights(allSegs, ah);
  let cum=0;
  allSegs.forEach((s,i)=>{
    out[s.key]={left:assetLeft, top:A_TOP+cum, width:assetW, height:hs[i], z:41,
                // 最上面那段有右上圓角（左上角的弧由左側黑欄的右上圓角切出）
                radius: i===0 ? '0 45px 0 0' : '0'};
    cum+=hs[i];
  });

  // 負債段：左側欄、貼底，高度依「負債 / 月薪」比例。z=43 才會在黑欄(42)之上顯示。
  debtKeys.forEach(k=>{
    const pct=data[k].total/monthlySalary;
    let h=Math.min(pct,0.9)*ah;
    if(h<DEBT_MIN_H) h=DEBT_MIN_H;
    out[k]={left:0, top:pr.height-h, width:DEBT_COL_W, height:h, z:43,
            radius:'0 34px 0 0'};
  });
  return out;
}

function buildFull(){
  aLabels.innerHTML=''; addLabels(allSegs);
  buildDebtCol();
}
/* 左側負債欄：只負責黑底與標籤，色塊本身由 #bar 的 debt 段擔任 */
function buildDebtCol(){
  aDebtCol.innerHTML='';
  const ah=areaH();
  aDebtCol.style.top=A_TOP+'px';
  aDebtCol.style.bottom='0px';
  debtKeys.forEach(k=>{
    const pct=data[k].total/monthlySalary;             // 以月薪為比較基準
    let h=Math.min(pct,0.9)*ah;                        // 高度上限 90%，避免超過月薪時佔滿
    if(h<DEBT_MIN_H) h=DEBT_MIN_H;
    // 色塊本身不在這裡建立 —— 由 #bar 的 debt 段變形過來，避免出現兩組色塊。

    const lbl=document.createElement('div');
    lbl.className='a-debtlbl';
    lbl.dataset.key=k;
    const v=pct*100;
    const pctTxt = (Math.abs(v-Math.round(v))<1e-9) ? String(Math.round(v))
                 : (v<1 ? v.toFixed(2) : v<10 ? v.toFixed(1) : String(Math.round(v)));
    // 色塊夠高才排成兩行（百分比+月薪 / 標題）；太矮就壓成單行精簡版，避免溢出
    const compact = h < 70;
    if(compact) lbl.classList.add('compact');
    lbl.innerHTML = compact
      ? `<span class="p">${pctTxt}%</span><span class="l">${data[k].title}</span>`+
        `<span class="sal">(月薪)</span>`
      : `<span class="p">${pctTxt}%</span>`+
        `<span class="sal">(月薪)</span>`+
        `<span class="l">${data[k].title}</span>`;
    // 標籤放進「標籤層」(z=45)，不要放在黑欄(42)裡 ——
    // 否則會被負債色段(z=43)整個蓋住，文字就不見了。
    aLabels.appendChild(lbl);

    // 用 top 定位（不是 bottom）：先量出標籤實際高度，再放進色塊內，
    // 確保多行標籤（含月薪那行）不會溢出色塊上緣、落在黑底上看不見。
    // 注意：aLabels 是 phone 座標（inset:0），故需加上 A_TOP。
    const segTop=ah-h;                       // 色塊上緣（相對負債欄）
    const lh=lbl.offsetHeight;
    const pad = 16;                          // 與 addLabels 一致：距色塊上緣固定 16px
    let top = segTop + pad;
    if(top + lh > ah - 4) top = Math.max(segTop + 2, ah - 4 - lh);   // 不超出色塊下緣
    lbl.style.top = (A_TOP + top) + 'px';
  });
}
/* 百分比配額：小項先格式化，最大項 = 100 - 其餘（採相同小數位），確保顯示值合計剛好 100% */
function pctTexts(segs){
  const raw=segs.map(s=>s.amt/assetTotal*100);
  const bi=raw.indexOf(Math.max(...raw));
  // 決定小數位數：任一小項 <10 就用 2 位，否則 1 位；全部為整數比例則用 0 位
  const smalls=raw.filter((_,i)=>i!==bi);
  let dp = smalls.some(v=>v<10) ? 2 : (smalls.some(v=>v%1!==0) ? 1 : 0);
  let txt=raw.map((v,i)=> i===bi ? null : v.toFixed(dp));
  let others=txt.reduce((s,t)=> s + (t===null?0:parseFloat(t)), 0);
  let big=100-others;
  // 大項用相同小數位；若剛好整數則省略小數
  txt[bi]= (Math.abs(big-Math.round(big))<1e-9) ? String(Math.round(big)) : big.toFixed(dp);
  return txt;
}
const A_LBL_LEFT=133;   // .a-lbl 的 left（phone 座標）
function addLabels(segs){
  const ah=areaH();                 // 資產欄佔滿全高（合計 100%）
  const hs=allocHeights(segs, ah);
  const pts=pctTexts(segs);
  // 標籤最大寬度：從標籤左緣到資產欄右緣(畫面右緣)，留 14px 安全邊距 → 保證 right 不超出色塊
  const maxW=Math.max(64, phone.getBoundingClientRect().width - A_LBL_LEFT - 14);
  let cum=0;
  segs.forEach((s,i)=>{
    const segH=hs[i];
    const lbl=document.createElement('div');
    lbl.className='a-lbl';
    lbl.style.maxWidth=maxW+'px';
    // 依色塊高度分三段字級：越矮字級越小；最矮用單行精簡版。文字容器受 maxW 限制，過長換行不外溢
    if(segH<52){
      lbl.classList.add('mini');
    } else if(segH<120){
      lbl.classList.add('med');
    }
    lbl.innerHTML=`<div class="p">${pts[i]}%</div><div class="l">${s.name}</div>`;
    aLabels.appendChild(lbl);
    // 垂直位置：先量標籤實際高度。放得下就距上緣 16px（維持對齊）；
    // 放不下（薄色塊）就垂直置中，確保整個標籤留在色塊內、不掉到隔壁色塊。
    const lh=lbl.offsetHeight;
    let off=16;
    if(16 + lh > segH - 2){ off=Math.max(2, (segH - lh)/2); }
    lbl.style.top=(A_TOP+cum+off)+'px';
    cum+=segH;
  });
}

const A_EASE='var(--ease)', A_EASE_C='var(--ease-close)';

/* 讓「唯一那組色塊」的三段各自變形到目標矩形。
   展開/收合都走同一條路徑，只是目標與緩動不同 → 全程連續，沒有畫面切換。 */
function animateBarTo(rects, dur, ease){
  const bar=document.getElementById('bar');
  bar.querySelectorAll('.seg').forEach(seg=>{
    const t=rects[seg.dataset.key];
    if(!t) return;
    seg.style.transition=`left ${dur}ms ${ease}, top ${dur}ms ${ease}, `+
                         `width ${dur}ms ${ease}, height ${dur}ms ${ease}, `+
                         `border-radius ${dur}ms ${ease}`;
    seg.style.left=t.left+'px';
    seg.style.top=t.top+'px';
    seg.style.width=t.width+'px';
    seg.style.height=t.height+'px';
    seg.style.zIndex=String(t.z);
    seg.style.borderRadius=t.radius;
  });
}

function openAlloc(){

  barExpanded=true;

  // 三段各自從主頁位置，變形到分配比的位置與大小
  animateBarTo(allocBarRects(), A_MS, A_EASE);

  setTimeout(()=>{
    aHead.classList.add('show');
    aLabels.querySelectorAll('.a-lbl').forEach(l=>l.classList.add('show'));
    aLabels.querySelectorAll('.a-debtlbl').forEach(e=>e.classList.add('show'));
  },A_MS-140);
}

  aLabels.querySelectorAll('.a-debtlbl').forEach(e=>e.classList.remove('show'));
  allocEl.classList.add('closing');
  document.body.classList.add('alloc-closing');
  document.body.classList.remove('alloc-open');

  // 三段各自縮回主頁的位置與大小（同一組色塊，不做任何切換）
  animateBarTo(homeBarRects(), A_CLOSE_MS, A_EASE_C);

  setTimeout(()=>{
    allocEl.classList.remove('on');
    allocEl.classList.remove('closing');
    document.body.classList.remove('alloc-closing');
    bar.classList.remove('expanded');
    barExpanded=false;
    layoutBar();                     // 回主頁佈局（此時值已相同，不會跳動）
  }, A_CLOSE_MS);
}

/* ===== 主頁手勢：右滑→資產分配比、上滑→幣別頁；分配比左滑關、幣別頁下滑關 =====
   （點淨資產金額仍可開幣別頁、點色塊仍可開分配比，手勢為額外入口） */
(function(){
  let sx=0, sy=0, st=0;
  const homeEl=document.getElementById('home');
  function view(){
    if(document.getElementById('adet').classList.contains('on')) return 'adet';
    if(currOpen) return 'curr';
    if(barExpanded) return 'alloc';
    if(document.getElementById('trend').classList.contains('on')) return 'trend';
    if(document.getElementById('settings').classList.contains('show')) return 'settings';
    if(document.getElementById('addpage').classList.contains('on')) return 'addpage';
    return 'home';
  }
  phone.addEventListener('touchstart',e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; st=Date.now(); },{passive:true});
  phone.addEventListener('touchend',e=>{
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Date.now()-st>700) return;                  // 太慢不算滑動
    const ax=Math.abs(dx), ay=Math.abs(dy);
    if(ax<50 && ay<50) return;                     // 位移太小不算
    const v=view();
    if(v==='home'){
      if(ax>ay){ if(dx>50) openAlloc(); }                       // 右滑 → 分配比
      else if(dy<-50 && homeEl.scrollTop<=2){ openCurr(); }     // 上滑(且在頂端) → 幣別頁
    } else if(v==='alloc'){
      if(ax>ay && dx<-50) closeAlloc();                          // 左滑 → 回主頁
    } else if(v==='curr'){
      if(ay>ax && dy>50) closeCurr();                            // 下滑 → 回主頁
    }
  },{passive:true});
})();

/* =========================================================
   資產詳情頁：從分配比點色塊進入，顯示該資產內細項的水平長條圖

const adetEl=document.getElementById('adet');

const adBars=document.getElementById('adBars');
const AD_COLOR={bank:'var(--bank)',tw_stock:'var(--tw_stock)',sub_broker:'var(--sub_broker)',overseas:'var(--overseas)',daily:'var(--daily)'};
const AD_TOTAL_H=200;   // 所有色塊總高(px)，對齊影片(172+25)
const AD_MIN_H=25;      // 最小色塊高度，讓極小佔比仍看得見

function adHeights(rows,total){
  let hs=rows.map(r=>r.amt/total*AD_TOTAL_H);
  let debt=0;
  hs=hs.map(h=>{ if(h<AD_MIN_H){ debt+=AD_MIN_H-h; return AD_MIN_H; } return h; });
  if(debt>0){ const bi=hs.indexOf(Math.max(...hs)); hs[bi]=Math.max(AD_MIN_H,hs[bi]-debt); }
  return hs;
}

// 只有這三組做「類型金額對比」：閒置資金(國泰cube/Firstrade) vs 股票(其他)

const TREEMAP_GROUPS={tw_stock:1, sub_broker:1, overseas:1};    // 熱力圖 treemap（圖一：finviz 風格，面積依市值）
const BLOCK_PALETTE=['#63bd6b','#ef8b68','#f9e36d','#d4aaea','#6bd5d1','#8b93f0','#f078b6','#5bd672','#ffb37a','#9ad0ff','#c7b3ff','#7fd8a6'];

// 比例堆疊色塊（銀行帳戶占比）：每塊高度依金額比例，min-height 保護小項
function stackedBlocksHTML(rows){
  const total=rows.reduce((s,r)=>s+r.amt,0)||1;
  let h=`<div class="da-stack">`;
  rows.forEach((r,i)=>{
    const pct=r.amt/total*100;
    h+=`<div class="da-stkseg" style="flex-grow:${Math.pow(Math.max(r.amt,1),0.5)};background:${BLOCK_PALETTE[i%BLOCK_PALETTE.length]}">`+
       `<div class="r"><span class="bpct">${pctStr(pct)}%</span><span class="bamt">${money(Math.round(r.amt))}</span></div>`+
       `<div class="bnm">${r.name}</div></div>`;
  });
  return h+`</div>`;
}

// squarified treemap 佈局：面積依 values 比例填滿 W×H，回傳每格 {x,y,w,h}（順序同輸入）
function treemapLayout(values, W, H){
  const total=values.reduce((a,b)=>a+b,0)||1;
  const areas=values.map(v=>v/total*(W*H));
  const rects=new Array(values.length);
  let x=0,y=0,w=W,h=H,idx=0; const n=areas.length;
  const worst=(row,side)=>{ const sum=row.reduce((a,b)=>a+b,0), mx=Math.max(...row), mn=Math.min(...row);
    const s2=side*side, sm2=sum*sum; return Math.max(s2*mx/sm2, sm2/(s2*mn)); };
  while(idx<n){
    const side=Math.min(w,h); let row=[areas[idx]]; let k=idx+1;
    while(k<n){ const nr=row.concat(areas[k]); if(worst(nr,side)<=worst(row,side)){ row.push(areas[k]); k++; } else break; }
    const sum=row.reduce((a,b)=>a+b,0);
    if(w>=h){ const colW=sum/h; let yy=y; for(let j=0;j<row.length;j++){ const ch=row[j]/sum*h; rects[idx+j]={x,y:yy,w:colW,h:ch}; yy+=ch; } x+=colW; w-=colW; }
    else { const rowH=sum/w; let xx=x; for(let j=0;j<row.length;j++){ const cw=row[j]/sum*w; rects[idx+j]={x:xx,y,w:cw,h:rowH}; xx+=cw; } y+=rowH; h-=rowH; }
    idx+=row.length;
  }
  return rects;
}
// 占比深淺綠（越大越深，暫以占比上色；接 getStocks 後改依報酬率紅綠）
function tmShade(pct){ return `hsl(146,52%,${Math.round(52-Math.min(pct,45)/45*28)}%)`; }
function renderTreemap(id, rows){
  const el=document.getElementById(id); if(!el) return;
  const W=el.clientWidth||(phone.getBoundingClientRect().width-40);
  // 高度隨項目數增加，確保每格都放得下 名稱/占比/金額（面積不必等於真實比例）
  const H=Math.max(Math.round(phone.getBoundingClientRect().height*0.56), rows.length*46);
  el.style.height=H+'px';
  const total=rows.reduce((s,r)=>s+r.amt,0)||1;
  const sorted=[...rows].sort((a,b)=>b.amt-a.amt);
  // 面積用壓縮權重（開根號）：大小仍有對比，但小項不會被壓到看不見、文字塞不下
  const rects=treemapLayout(sorted.map(r=>Math.pow(Math.max(r.amt,1),0.5)), W, H);
  el.innerHTML=sorted.map((r,i)=>{
    const R=rects[i], pct=r.amt/total*100;
    const nm = (R.h>=40) ? `<div class="tm-nm">${r.name}</div>` : '';
    const am = (R.h>=40) ? `<div class="tm-amt">${money(Math.round(r.amt))}</div>` : '';
    return `<div class="tm-cell" style="left:${R.x}px;top:${R.y}px;width:${R.w}px;height:${R.h}px;background:${tmShade(pct)}"><div class="tm-in">${nm}<div class="tm-pct">${pctStr(pct)}%</div>${am}</div></div>`;
  }).join('');
}
const IDLE_COLOR='#6bd5d1';                              // 閒置資金比例條顏色（青綠）
function pctStr(v){ return v<10 ? v.toFixed(1) : String(Math.round(v)); }

/* ===== 消費明細（日常消費詳情頁：週檢視 + 左右滑換日） =====
   資料來源：後端 getConsumption?ym=YYYY-MM 讀當月分頁 A1:AE{天數+1}
   （列=日期，第2列=1號；B欄起每5欄一組：項目/金額/支付方式/回饋類別/消費類別，一天最多6筆），
   回傳 {ok,year,month,days:{日:[{item,amt,pay,reward,cat}]}}。前端依月份延遲載入並快取。
   ⚠️ 需先在 Apps Script 重新部署含 getConsumption 的 WebApp.gs，否則各日顯示「無消費紀錄」。 */
const dcCache={};      // key 'y-m' → {日:[...]}（已載入的月份）
const dcLoading={};    // key 'y-m' → true（載入中，避免重複抓）
const WD_LABELS=['日','一','二','三','四','五','六'];   // 週日為第一天、週六為最後一天
const CAT_COLORS={餐費:'#ff8a5b',奢侈品:'#c792ea',電信費:'#5b8def',交通:'#4bc8b5',娛樂:'#f078b6',生活:'#5bd672',醫療:'#ff6b6b',一般消費:'#9aa4b8'};
function catColor(c){ return CAT_COLORS[c] || '#9aa4b8'; }
function daysInMonthOf(y,m){ return new Date(y,m,0).getDate(); }
// 給定日，算其所在週(週日起算)七格；超出當月的格 valid=false，回傳裁切到當月的日期範圍
function weekOfDay(day,dim,y,m){
  const wi=new Date(y,m-1,day).getDay();   // 0=週日 … 6=週六
  const sunday=day-wi;
  const cells=[]; for(let i=0;i<7;i++){ const d=sunday+i; cells.push({wd:i,day:d,valid:d>=1&&d<=dim}); }
  const valid=cells.filter(c=>c.valid);
  return {cells, first:valid[0].day, last:valid[valid.length-1].day};
}
let dcYear=2026,dcMonth=7,dcDim=31,dcData={},dcSel=1;
function buildConsumption(){
  // 預設：當月今天（與 getDashboard 的當月一致）；實際資料由 dcGoto 觸發載入
  const t=new Date();
  dcYear=t.getFullYear(); dcMonth=t.getMonth()+1;
  dcDim=daysInMonthOf(dcYear,dcMonth);
  dcSel=Math.min(t.getDate(), dcDim);
}
const dc2=n=>String(n).padStart(2,'0');
// 取某年月已快取的消費資料（未載入 → {}）
function dcMonthDays(y,m){ return dcCache[y+'-'+m] || {}; }
// 非同步載入某月消費（快取；完成後若仍在該月則重繪）
function dcLoadMonth(y,m){
  const key=y+'-'+m;
  if((key in dcCache) || dcLoading[key]) return;
  dcLoading[key]=true;
  api({action:'getConsumption', ym:`${y}-${dc2(m)}`}).then(res=>{
    dcLoading[key]=false;
    dcCache[key]=(res && res.ok && res.days) ? res.days : {};
    if(dcYear===y && dcMonth===m){ dcData=dcCache[key]; renderConsumption(); }
  }).catch(()=>{ dcLoading[key]=false; dcCache[key]={}; if(dcYear===y && dcMonth===m) renderConsumption(); });
}
// 跳到指定年月日：更新該月天數/資料、同步選擇器範圍，並確保該月已載入
function dcGoto(y,m,d){
  dcYear=y; dcMonth=m; dcDim=daysInMonthOf(y,m); dcData=dcMonthDays(y,m);
  dcSel=Math.max(1,Math.min(dcDim,d));
  dcSetPickerRange();
  dcLoadMonth(y,m);      // 先設載入旗標並發動抓取（若尚未載入）
  renderConsumption();   // 後繪 → 尚未載入時顯示「載入中…」
}
function dcSetDay(d){ if(d>=1 && d<=dcDim && d!==dcSel){ dcSel=d; renderConsumption(); } }   // 同月切日（週橫列點選/選擇器）
// 左右滑換日；越過月初/月底自動進到上/下個月（週日→下週、月一→上週由週橫列重繪自然銜接）
function dcNav(delta){
  let y=dcYear, m=dcMonth, d=dcSel+delta;
  if(d<1){ m--; if(m<1){ m=12; y--; } dcGoto(y,m,daysInMonthOf(y,m)); }   // 左滑過月初 → 上個月最後一天
  else if(d>dcDim){ m++; if(m>12){ m=1; y++; } dcGoto(y,m,1); }           // 右滑過月底 → 下個月第一天
  else dcSetDay(d);
}
// 日期選擇器範圍：跟著目前檢視的月份
function dcSetPickerRange(){
  const inp=document.getElementById('dcDate'); if(!inp) return;
  inp.min=`${dcYear}-${dc2(dcMonth)}-01`;
  inp.max=`${dcYear}-${dc2(dcMonth)}-${dc2(dcDim)}`;
}
// 設定日期選擇器（每次開頁綁一次）：範圍=當月，選擇後跳到該日
function dcSetupDatePicker(){
  const inp=document.getElementById('dcDate'); if(!inp) return;
  dcSetPickerRange();
  inp.addEventListener('change',()=>{
    if(!inp.value) return;
    const p=inp.value.split('-');
    dcGoto(Number(p[0]), Number(p[1]), Number(p[2]));
  });
}
function renderConsumption(){
  const weekEl=document.getElementById('dcWeek'); if(!weekEl) return;
  const wk=weekOfDay(dcSel,dcDim,dcYear,dcMonth);
  const inp=document.getElementById('dcDate');
  if(inp) inp.value=`${dcYear}-${dc2(dcMonth)}-${dc2(dcSel)}`;   // 同步選擇器為目前選定日
  weekEl.innerHTML=wk.cells.map(c=>{
    if(!c.valid) return `<div class="dc-day disabled"></div>`;
    const sel=c.day===dcSel?' sel':'';
    const has=(dcData[c.day]&&dcData[c.day].length)?' has':'';
    return `<button class="dc-day${sel}${has}" data-day="${c.day}"><span class="wd">${WD_LABELS[c.wd]}</span><span class="dn">${c.day}</span></button>`;
  }).join('');
  weekEl.querySelectorAll('.dc-day[data-day]').forEach(b=>b.addEventListener('click',()=>dcSetDay(Number(b.dataset.day))));
  const items=dcData[dcSel]||[];
  const listEl=document.getElementById('dcList');
  listEl.innerHTML = items.length ? items.map(it=>{
    const col=catColor(it.cat);
    return `<div class="dc-item"><div class="dc-r1"><span class="dc-name">${it.item}</span><span class="dc-amt">${money(it.amt)}</span></div>`+
      `<div class="dc-r2"><span class="dc-cat" style="background:${col}">${it.cat}</span>`+
      `<span class="dc-pay">${it.pay}</span>`+
      (it.reward?`<span class="dc-reward">${it.reward}</span>`:'')+
      `</div></div>`;
  }).join('') : `<div class="dc-empty">${dcLoading[dcYear+'-'+dcMonth]?'載入中…':'當日無消費紀錄'}</div>`;
}
// 左右滑換日（綁在 #adet 消費明細區）
let dcTouchX=null;
function dcAttachSwipe(el){
  el.addEventListener('touchstart',e=>{ dcTouchX=e.touches[0].clientX; },{passive:true});
  el.addEventListener('touchend',e=>{
    if(dcTouchX==null) return;
    const dx=e.changedTouches[0].clientX-dcTouchX; dcTouchX=null;
    if(Math.abs(dx)>40) dcNav(dx<0? 1 : -1);   // 左滑(dx<0)→下一天、右滑(dx>0)→前一天
  },{passive:true});
}

function openAssetDetail(key){
  const d=data[key];
  adTitle.textContent=d.title;
  const rows=[...d.rows].sort((a,b)=>b.amt-a.amt);   // 金額大到小
  const total=d.total || rows.reduce((s,r)=>s+r.amt,0) || 1;
  const gcolor=AD_COLOR[key];
  let html='';

  // 類型金額對比（僅 台股/複委託/海外券商）：閒置資金 vs 股票
  if(IDLE_GROUPS[key]){
    const idleAmt=rows.filter(r=>isIdleName(r.name)).reduce((s,r)=>s+r.amt,0);
    const stockAmt=Math.max(0,total-idleAmt);
    // 比例條寬度用實際佔比；顯示文字讓兩者相加剛好 100%（避免 0.2%+100% 的捨入怪象）
    const typeRow=(nm,amt,pctText,color)=>
      `<div class="da-type-row"><div class="r"><span class="da-type-nm">${nm}</span>`+
      `<span><span class="da-type-pct">${pctText}%</span><span class="da-type-amt">${money(Math.round(amt))}</span></span></div>`+
      `<div class="da-type-track"><i style="width:${Math.max(1,amt/total*100)}%;background:${color}"></i></div></div>`;
    html+=`<div class="da-sec-title first">類型金額對比</div>`;
    if(idleAmt>0){
      const idleTxt=pctStr(idleAmt/total*100);
      const dec=idleTxt.includes('.')?1:0;                     // 股票小數位跟閒置資金一致
      const stockTxt=(100-parseFloat(idleTxt)).toFixed(dec);   // → 兩者相加剛好 100
      html+=typeRow('閒置資金', idleAmt, idleTxt, IDLE_COLOR);
      html+=typeRow('股票', stockAmt, stockTxt, gcolor);
    } else {
      html+=typeRow('股票', stockAmt, '100', gcolor);
    }
  }

  // 金額占比：銀行/股票 → 色塊化；日常消費 → 維持密集清單
  html+=`<div class="da-sec-title${IDLE_GROUPS[key]?'':' first'}">${LIST_TITLE[key]||'帳戶金額占比'}</div>`;
  if(STACK_GROUPS[key]){
    html+=stackedBlocksHTML(rows);                         // 銀行：比例堆疊色塊
  }else if(TREEMAP_GROUPS[key]){
    html+=`<div class="da-treemap" id="daTreemap"></div>`; // 股票：熱力圖 treemap（innerHTML 後再佈局）
  }else{
    html+=`<div class="da-list">`;
    rows.forEach(r=>{
      const pct=r.amt/total*100;
      html+=`<div class="da-li"><div class="da-li-r"><span class="da-li-nm">${r.name}</span>`+
        `<span class="da-li-right"><span class="da-li-pct">${pctStr(pct)}%</span><span class="da-li-amt">${money(Math.round(r.amt))}</span></span></div>`+
        `<div class="da-li-track"><i style="width:${Math.max(1,pct)}%;background:${gcolor}"></i></div></div>`;
    });
    html+=`</div>`;
  }

  // 消費明細（僅日常消費）：週檢視 + 左右滑換日
  if(key==='daily'){
    buildConsumption();
    html+=`<div class="da-sec-title"><span class="dc-title" id="dcTitle">消費明細`+
        `<svg class="dc-cal" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`+
        `<input type="date" id="dcDate" class="dc-dateinput" aria-label="選擇日期"></span></div>`+
      `<div class="dc-week" id="dcWeek"></div>`+
      `<div class="dc-list" id="dcList"></div>`;
  }

  adBars.innerHTML=html;
  if(STACK_GROUPS[key]){ const el=adBars.querySelector('.da-stack'); if(el){ // 色塊高度補滿到頁面底部（扣掉 #adet 底部 padding 40）
      const avail=adetEl.getBoundingClientRect().bottom-el.getBoundingClientRect().top-40;
      el.style.height=Math.max(avail, 320)+'px'; } }
  if(TREEMAP_GROUPS[key]){ renderTreemap('daTreemap', rows); }
  if(key==='daily'){ dcSetupDatePicker(); dcAttachSwipe(adBars); dcGoto(dcYear,dcMonth,dcSel); }
  adetEl.classList.add('on');   // 頁面淡入由 #adet.on 過渡處理（不依賴 rAF，內容立即可見）
}

/* 「全部更新」：清掉快取並強制重新抓取 */
document.getElementById('refreshAll').addEventListener('click',()=>{
  ov.classList.remove('show');sheet.classList.remove('show');
  try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
  boot(true);
});

/* ===== 設定頁 — 欄位對應（動態，讀寫 Config 分頁） ===== */
const settingsEl=document.getElementById('settings');
const cfgListEl=document.getElementById('cfgList');
const setStatusEl=document.getElementById('setStatus');
let settingsLoaded=false;

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(msg,type){setStatusEl.textContent=msg||'';setStatusEl.className='set-status'+(type?(' '+type):'');}

// 八欄下拉選項
const CFG_GROUPS=['bank','tw_stock','sub_broker','overseas','daily','_setting'];
const CFG_CURRENCIES=['','TWD','USD'];
function optionList(options, val){
  const opts = options.indexOf(val)>=0 ? options : [val, ...options];   // 未知值也保留，不會被吃掉
  return opts.map(o=>`<option value="${esc(o)}"${o===val?' selected':''}>${o===''?'（空）':esc(o)}</option>`).join('');
}
// 前端解析「分頁!範圍」（含 {MONTH} 置換），供測試按鈕用
function monthTab(){ return (new Date().getMonth()+1)+'月'; }
function parseRangeClient(ref){
  if(!ref) return null;
  ref=String(ref).replace(/\{MONTH\}/g, monthTab());
  const i=ref.indexOf('!'); if(i<0) return null;
  return { sheet:ref.slice(0,i).trim().replace(/^'|'$/g,''), cell:ref.slice(i+1).trim() };
}

// 建一列可編輯的欄位對應（八欄：id/群組/名稱範圍/金額範圍/幣別/排序/備註/顯示名稱）
function cfgRowEl(c){
  c=c||{id:'',group:'',nameRange:'',amountRange:'',currency:'',order:'',note:'',displayName:''};
  const row=document.createElement('div');
  row.className='cfg-row';
  row.innerHTML=`
    <div class="cfg-fields">
      <label>id<input class="f-id" value="${esc(c.id)}" placeholder="bank_1"></label>
      <label>群組<select class="f-group">${optionList(CFG_GROUPS, c.group||'')}</select></label>
      <label>名稱範圍<input class="f-nameRange" value="${esc(c.nameRange)}" placeholder="帳戶!R7:R9"></label>
      <label>金額範圍<input class="f-amountRange" value="${esc(c.amountRange)}" placeholder="帳戶!X7:X9"></label>
      <label>幣別<select class="f-currency">${optionList(CFG_CURRENCIES, (c.currency||'').toUpperCase())}</select></label>
      <label>排序<input class="f-order" value="${esc(c.order!=null?c.order:'')}" placeholder="1"></label>
      <label>備註<input class="f-note" value="${esc(c.note)}" placeholder="實體銀行"></label>
      <label>顯示名稱<input class="f-displayName" value="${esc(c.displayName)}" placeholder="覆寫用，可留空"></label>
    </div>
    <div class="cfg-actions">
      <button class="cfg-test">測試</button>
      <button class="cfg-del">刪除</button>
      <span class="cfg-result"></span>
    </div>`;
  // 測試：讀該範圍第一格的值（優先金額範圍，其次名稱範圍）
  row.querySelector('.cfg-test').addEventListener('click',()=>{
    const ref=(row.querySelector('.f-amountRange').value.trim())||(row.querySelector('.f-nameRange').value.trim());
    const res=row.querySelector('.cfg-result');
    const pr=parseRangeClient(ref);
    if(!pr){res.className='cfg-result err';res.textContent='範圍需為「分頁!儲存格」格式';return;}
    res.className='cfg-result';res.textContent='讀取中…';
    api({action:'readCell',sheet:pr.sheet,cell:pr.cell}).then(r=>{
      if(!r||r.ok===false)throw new Error((r&&r.error)||'讀取失敗');
      res.className='cfg-result';res.textContent=pr.sheet+'!'+pr.cell+' 第一格 = '+r.value;
    }).catch(err=>{res.className='cfg-result err';res.textContent='✕ '+((err&&err.message)||err);});
  });
  row.querySelector('.cfg-del').addEventListener('click',()=>row.remove());
  return row;
}

function renderSettings(config){
  cfgListEl.innerHTML='';
  (config||[]).forEach(c=>cfgListEl.appendChild(cfgRowEl(c)));
}

// 第一次進設定頁才讀 Config（避免每次切頁重打）
function ensureSettingsLoaded(){
  if(settingsLoaded)return;
  setStatus('讀取 Config 中…');
  api({action:'getConfig'}).then(r=>{
    if(!r||r.ok===false)throw new Error((r&&r.error)||'getConfig 失敗');
    renderSettings(r.config);
    settingsLoaded=true;
    setStatus('');
  }).catch(err=>{setStatus('讀取失敗：'+((err&&err.message)||err),'err');});
}

document.getElementById('openSet').addEventListener('click',()=>{
  ov.classList.remove('show');sheet.classList.remove('show');
  settingsEl.classList.add('show');
  ensureSettingsLoaded();
});
document.getElementById('setBack').addEventListener('click',()=>settingsEl.classList.remove('show'));
document.getElementById('cfgAdd').addEventListener('click',()=>cfgListEl.appendChild(cfgRowEl()));
document.getElementById('cfgSave').addEventListener('click',()=>{
  const rows=[...cfgListEl.querySelectorAll('.cfg-row')].map(row=>{
    const ov=row.querySelector('.f-order').value.trim();
    return {
      id:row.querySelector('.f-id').value.trim(),
      group:row.querySelector('.f-group').value.trim(),
      nameRange:row.querySelector('.f-nameRange').value.trim(),
      amountRange:row.querySelector('.f-amountRange').value.trim(),
      currency:row.querySelector('.f-currency').value.trim(),
      order: ov===''?'':(isNaN(Number(ov))?ov:Number(ov)),
      note:row.querySelector('.f-note').value.trim(),
      displayName:row.querySelector('.f-displayName').value.trim()
    };
  }).filter(c=>c.id||c.group||c.nameRange||c.amountRange);
  // 儲存前確認：saveConfig 會清掉 Config 現有內容再整批寫入
  if(!window.confirm('確定用目前這 '+rows.length+' 列覆寫 Google Sheet 的 Config 分頁？\n此動作會清掉 Config 現有 A~H 內容再寫入，無法復原。')) return;
  const btn=document.getElementById('cfgSave');
  btn.disabled=true;setStatus('儲存中…');
  api({action:'saveConfig',config:JSON.stringify(rows)}).then(r=>{
    if(!r||r.ok===false)throw new Error((r&&r.error)||'saveConfig 失敗');
    setStatus('✓ 已儲存 '+r.saved+' 列（八欄）到 Google Sheet（按「全部更新」即套用）','ok');
    try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
  }).catch(err=>{setStatus('✕ 儲存失敗：'+((err&&err.message)||err),'err');}).then(()=>{btn.disabled=false;});
});
</script>
</body>
</html>
